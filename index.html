<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <!-- SEO -->
    <title>Starrush - Jogo Grátis de Estrelas | Ranking Global</title>
    <meta name="description" content="Jogue Starrush grátis! Colete estrelas, evite obstáculos, compete no ranking global. App instalável, funciona offline.">

    <link rel="manifest" href="/manifest.json">

    <!-- AdSense H5 Games - Rewarded Video Ads -->

        window.adsbygoogle = window.adsbygoogle || [];
        const adBreak = adConfig = function(o) { adsbygoogle.push(o); }

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f2a, #1a1f3a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }
        
        #gameContainer {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 15px;
        }
        
        #statsBar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            color: white;
            font-weight: bold;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.8em;
            opacity: 0.8;
        }
        
        .stat-value {
            font-size: 1.5em;
            color: #ffd700;
            margin-top: 5px;
        }
        
        #gameCanvas {
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, #2a2f4a, #0f142a);
            border-radius: 20px;
            display: block;
            margin-bottom: 15px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            touch-action: none;
        }
        
        .game-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .game-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1f3a, #2a2f4a);
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            color: white;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 10001;
            animation: slideIn 0.3s;
        }
        
        .toast.success { border-left: 4px solid #4CAF50; }
        .toast.error { border-left: 4px solid #f44336; }
        
        @keyframes slideIn {
            from { transform: translateX(400px); }
            to { transform: translateX(0); }
        }
        
        #installBtn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: none;
            z-index: 9998;
        }
        
        .privacy-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.8em;
        }
        
        .privacy-link a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
        }
        
        .privacy-link a:hover {
            color: rgba(255,255,255,0.9);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Stats Bar -->
        <div id="statsBar">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">RECORDE</div>
                <div class="stat-value" id="recordDisplay">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="comboDisplay">x1</div>

        </div>
        
        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- Controls -->
        <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">

            <button class="game-btn" id="watchAdBtn">🎁 VER VÍDEO</button>

        <!-- Privacy Policy Link -->
        <div class="privacy-link">
            <a href="/privacy-policy.html" target="_blank">Política de Privacidade</a>
        </div>
    </div>
    
    <!-- Install PWA Button -->
    <button id="installBtn">📱 INSTALAR APP</button>
    
    <script>
        'use strict';
        
        // ==================== CONFIGURAÇÃO ====================
        
        // 🔥 SUPABASE - Configurado!
        const SUPABASE_URL = 'https://aflypjszvkyrowpzugii.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbHlwanN6dmt5cm93cHp1Z2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjcyOTgsImV4cCI6MjA4ODQwMzI5OH0.tveCVmmGRvyEiK6YeRUSypOa9PZq_dohTCwCYpcyEGo';
        
        // ==================== FIM DA CONFIGURAÇÃO ====================
        
        // Inicializar Supabase
        let supabase = null;
        let supabaseInitialized = false;
        
        try {
            if (SUPABASE_URL !== 'SUA_SUPABASE_URL_AQUI' && SUPABASE_URL.includes('supabase.co')) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                supabaseInitialized = true;
                console.log('✅ Supabase conectado');
            } else {
                console.warn('⚠️ Configure Supabase - use o script configurar-supabase.sh');
            }
        } catch (error) {
            console.error('❌ Erro Supabase:', error);
        }
        
        // ==================== GOOGLE ADSENSE H5 GAMES ====================
        
        let adsenseReady = false;
        
        // Configuração AdSense (FAMILY-FRIENDLY - Todas as idades)
        window.adConfig({
            preloadAdBreaks: 'on',
            tagForChildDirectedTreatment: 1,  // COPPA compliance
            underAgeOfConsent: true,          // GDPR compliance
            onReady: () => {
                console.log('✅ AdSense H5 pronto (child-safe mode)');
                adsenseReady = true;
            }
        });
        
        // Anúncio antes do jogo (preroll)
        function showPrerollAd(callback) {
            if (!adsenseReady) {
                if (callback) callback();
                return;
            }
            
            window.adBreak({
                type: 'start',
                name: 'game-start',
                beforeAd: () => {
                    console.log('Anúncio iniciando...');
                    gameState.gameActive = false;
                },
                afterAd: () => {
                    console.log('Anúncio finalizado');
                    gameState.gameActive = true;
                    if (callback) callback();
                },
                adBreakDone: (placementInfo) => {
                    console.log('AdBreak concluído:', placementInfo);
                }
            });
        }
        
        // Anúncio recompensado (ganhar vida)
        function showRewardedAd(rewardCallback) {
            if (!adsenseReady) {
                showToast('Anúncios não disponíveis', 'error');
                return;
            }
            
            window.adBreak({
                type: 'reward',
                name: 'watch-for-life',
                beforeAd: () => {
                    console.log('Vídeo recompensado iniciando...');
                    gameState.gameActive = false;
                },
                afterAd: () => {
                    console.log('Vídeo finalizado');
                    gameState.gameActive = true;
                },
                beforeReward: (showAdFn) => {
                    showAdFn();
                },
                adDismissed: () => {
                    showToast('Vídeo não concluído', 'error');
                },
                adViewed: () => {
                    if (rewardCallback) rewardCallback();
                    showToast('✅ Vida extra ganha!', 'success');
                },
                adBreakDone: (placementInfo) => {
                    console.log('Rewarded ad concluído:', placementInfo);
                }
            });
        }
        
        // ==================== MÓDULO DE SEGURANÇA ====================
        const SecurityModule = {
            escapeHTML(unsafe) {
                if (!unsafe) return '';
                const div = document.createElement('div');
                div.textContent = String(unsafe);
                return div.innerHTML;
            },
            
            sanitizePlayerName(rawName) {
                if (!rawName || typeof rawName !== 'string') return 'Jogador';
                let name = rawName.trim().replace(/[^a-zA-ZÀ-ÿ0-9\s\-_]/g, '');
                name = name.replace(/\s+/g, ' ').substring(0, 15).trim();
                if (name.length < 2) return 'Jogador';
                return name;
            },
            
            generateSecureSessionId() {
                if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
                    const array = new Uint8Array(16);
                    crypto.getRandomValues(array);
                    return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
                }
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }
        };
        
        // ==================== UTILIDADES ====================
        function showToast(message, type = 'info', duration = 3000) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s reverse';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
        
        function showModal(title, content) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>${title}</h2>
                    ${content}
                    <button class="game-btn" onclick="this.closest('.modal').remove()" style="margin-top: 20px; width: 100%;">
                        Fechar
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        }
        
        // ==================== GAME STATE ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 400;
        canvas.height = 400;
        
        const gameState = {
            score: 0,
            record: parseInt(localStorage.getItem('starrush_record')) || 0,
            combo: 1,
            maxCombo: 1,
            stars: [],
            obstacles: [],
            player: { x: 200, y: 200, radius: 15 },
            gameActive: true,
            playerName: localStorage.getItem('starrush_player_name') || null,
            sessionId: SecurityModule.generateSecureSessionId(),
            startTime: Date.now(),
            starsCollected: 0,
            baseSpeed: 1,
            lives: 3,
            maxLives: 3
        };
        
        // ==================== PLAYER NAME ====================
        function getPlayerName() {
            if (!gameState.playerName) {
                let rawName = prompt('👋 Qual é seu nome?');
                gameState.playerName = SecurityModule.sanitizePlayerName(rawName);
                localStorage.setItem('starrush_player_name', gameState.playerName);
                showToast(`Bem-vindo, ${gameState.playerName}!`, 'success');
            }
            return gameState.playerName;
        }
        
        // ==================== GAME LOGIC ====================
        function initGame() {
            gameState.score = 0;
            gameState.combo = 1;
            gameState.maxCombo = 1;
            gameState.stars = [];
            gameState.obstacles = [];
            gameState.player = { x: 200, y: 200, radius: 15 };
            gameState.gameActive = true;
            gameState.startTime = Date.now();
            gameState.starsCollected = 0;
            gameState.baseSpeed = 1;
            gameState.lives = 3;
            
            for (let i = 0; i < 5; i++) {
                createStar();
            }
            
            updateDisplay();
            getPlayerName();
            
            // Anúncio preroll a cada 3 jogos
            const gamesPlayed = parseInt(localStorage.getItem('games_played') || '0');
            if (gamesPlayed > 0 && gamesPlayed % 3 === 0) {
                showPrerollAd(() => {
                    console.log('Jogo iniciando após anúncio');
                });
            }
            localStorage.setItem('games_played', (gamesPlayed + 1).toString());
        }
        
        function createStar() {
            gameState.stars.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                radius: 10,
                collected: false
            });
        }
        
        function createObstacle() {
            gameState.obstacles.push({
                x: Math.random() * (canvas.width - 40) + 20,
                y: Math.random() * (canvas.height - 40) + 20,
                radius: 15,
                vx: (Math.random() - 0.5) * 2 * gameState.baseSpeed,
                vy: (Math.random() - 0.5) * 2 * gameState.baseSpeed
            });
        }
        
        function updateDisplay() {
            document.getElementById('scoreDisplay').textContent = Math.floor(gameState.score);
            document.getElementById('recordDisplay').textContent = Math.floor(gameState.record);
            document.getElementById('comboDisplay').textContent = `x${gameState.combo}`;
        }
        
        function checkCollisions() {
            // Estrelas
            gameState.stars.forEach(star => {
                if (star.collected) return;
                const dx = gameState.player.x - star.x;
                const dy = gameState.player.y - star.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < gameState.player.radius + star.radius) {
                    star.collected = true;
                    gameState.score += 10 * gameState.combo;
                    gameState.combo = Math.min(gameState.combo + 1, 10);
                    gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);
                    gameState.starsCollected++;
                    createStar();
                    updateDisplay();
                }
            });
            
            gameState.stars = gameState.stars.filter(s => !s.collected);
            
            // Obstáculos
            gameState.obstacles.forEach(obs => {
                const dx = gameState.player.x - obs.x;
                const dy = gameState.player.y - obs.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < gameState.player.radius + obs.radius) {
                    gameState.lives--;
                    obs.x = -100;
                    
                    if (gameState.lives <= 0) {
                        handleGameOver();
                    } else {
                        showToast(`💔 Vidas: ${gameState.lives}/${gameState.maxLives}`, 'error');
                    }
                }
            });
        }
        
        function updateObstacles() {
            if (Math.random() < 0.01 * gameState.baseSpeed && gameState.obstacles.length < 10) {
                createObstacle();
            }
            
            gameState.obstacles.forEach(obs => {
                obs.x += obs.vx;
                obs.y += obs.vy;
                
                if (obs.x < obs.radius || obs.x > canvas.width - obs.radius) obs.vx *= -1;
                if (obs.y < obs.radius || obs.y > canvas.height - obs.radius) obs.vy *= -1;
            });
            
            gameState.baseSpeed = 1 + gameState.score / 1000;
        }
        
        async function handleGameOver() {
            if (!gameState.gameActive) return;
            gameState.gameActive = false;
            
            if (gameState.score > gameState.record) {
                gameState.record = gameState.score;
                localStorage.setItem('starrush_record', gameState.record);
                showToast('🏆 NOVO RECORDE!', 'success', 5000);
            }
            
            updateDisplay();
            
            // Envia para Supabase
            if (supabaseInitialized && gameState.score > 0) {
                try {
                    await supabase.from('rankings').insert([{
                        player_id: gameState.sessionId,
                        player_name: gameState.playerName,
                        score: Math.floor(gameState.score),
                        stars_collected: gameState.starsCollected,
                        max_combo: gameState.maxCombo,
                        country: 'BR'
                    }]);
                    
                    showToast('✅ Pontuação enviada!', 'success');
                } catch (error) {
                    console.error('Erro:', error);
                }
            }
            
            showModal('💫 GAME OVER', `
                <p style="font-size: 1.2em; margin: 20px 0;">
                    <strong>Pontuação:</strong> ${Math.floor(gameState.score)}<br>
                    <strong>Estrelas:</strong> ${gameState.starsCollected}<br>
                    <strong>Max Combo:</strong> x${gameState.maxCombo}<br>
                    <strong>Recorde:</strong> ${Math.floor(gameState.record)}
                </p>
            `);
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.arc((i * 37) % canvas.width, (i * 23) % canvas.height, 1, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Game stars
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 10;
            gameState.stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Obstacles
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            gameState.obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Player
            ctx.fillStyle = '#4a90e2';
            ctx.shadowColor = '#4a90e2';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(gameState.player.x, gameState.player.y, gameState.player.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        function gameLoop() {
            if (gameState.gameActive) {
                updateObstacles();
                checkCollisions();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ==================== CONTROLS ====================
        let isDragging = false;
        
        function handleStart(e) {
            isDragging = true;
            handleMove(e);
        }
        
        function handleMove(e) {
            if (!isDragging || !gameState.gameActive) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            gameState.player.x = Math.max(gameState.player.radius, Math.min(x * (canvas.width / rect.width), canvas.width - gameState.player.radius));
            gameState.player.y = Math.max(gameState.player.radius, Math.min(y * (canvas.height / rect.height), canvas.height - gameState.player.radius));
        }
        
        function handleEnd() {
            isDragging = false;
        }
        
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd);
        
        // ==================== BUTTONS ====================
        document.getElementById('newGameBtn').onclick = () => {
            initGame();
            showToast('🌟 Novo jogo!', 'info');
        };
        
        document.getElementById('rankingBtn').onclick = async () => {
            if (!supabaseInitialized) {
                showModal('🏆 RANKING', `<p>Recorde local: ${gameState.record}</p><p style="color:#888;">Configure Supabase para ranking global!</p>`);
                return;
            }
            
            showToast('🔄 Carregando...', 'info', 2000);
            
            try {
                const { data } = await supabase
                    .from('rankings')
                    .select('*')
                    .order('score', { ascending: false })
                    .limit(10);
                
                let html = '<ol>';
                if (data && data.length > 0) {
                    data.forEach((item, i) => {
                        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
                        html += `<li>${medal} ${SecurityModule.escapeHTML(item.player_name)}: <strong>${item.score.toLocaleString()}</strong></li>`;
                    });
                } else {
                    html += '<li>Seja o primeiro!</li>';
                }
                html += '</ol>';
                
                showModal('🏆 RANKING GLOBAL', html);
            } catch (error) {
                showToast('Erro ao carregar', 'error');
            }
        };
        
        // Botão assistir vídeo para ganhar vida
        document.getElementById('watchAdBtn').onclick = () => {
            if (gameState.lives >= gameState.maxLives) {
                showToast('Vidas cheias!', 'info');
                return;
            }
            
            showRewardedAd(() => {
                gameState.lives = Math.min(gameState.lives + 1, gameState.maxLives);
                showToast(`💚 +1 vida! Total: ${gameState.lives}/${gameState.maxLives}`, 'success', 4000);
            });
        };
        
        document.getElementById('shareBtn').onclick = () => {
            const text = `🌟 Pontuei ${Math.floor(gameState.score)} no Starrush!\n\nConsegue me vencer? 🎮\n\nhttps://seu-jogo.netlify.app`;
            
            if (navigator.share) {
                navigator.share({ title: 'Starrush', text });
            } else {
                navigator.clipboard.writeText(text);
                showToast('✅ Copiado!', 'success');
            }
        };
        
        // ==================== PWA ====================
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
            setTimeout(() => {
                document.getElementById('installBtn').style.display = 'none';
            }, 10000);
        });
        
        document.getElementById('installBtn').onclick = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('installBtn').style.display = 'none';
        };
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(() => console.log('✅ SW OK'))
                .catch(err => console.error('SW erro:', err));
        }
        
        // ==================== INIT ====================
        initGame();
        gameLoop();
        
        console.log('🎮 Starrush carregado!');
        console.log('Supabase:', supabaseInitialized ? '✅' : '⚠️ Use configurar-supabase.sh');
        console.log('AdSense:', adsenseReady ? '✅' : '⏳ Carregando...');
    </script>
</body>
</html>
