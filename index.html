<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starrush - Calm Journey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0f2a, #1a1f3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            position: relative;
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 15px;
            position: relative;
            z-index: 1;
        }

        #statsBar {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            padding: 15px 20px;
            margin-bottom: 20px;
            color: white;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat span {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 1.2em;
        }

        #gameCanvas {
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, #2a2f4a, #0f142a);
            border-radius: 20px;
            display: block;
            margin: 0 auto 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            touch-action: none;
        }

        #controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }

        button {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            flex: 1 1 auto;
            min-width: 120px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.25);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
        }

        #shareButtons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .share-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            font-size: 0.9em;
            border-width: 1px;
        }

        .share-btn.x { background: rgba(0, 0, 0, 0.5); }
        .share-btn.facebook { background: rgba(24, 119, 242, 0.5); }
        .share-btn.whatsapp { background: rgba(37, 211, 102, 0.5); }

        #messageBox {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            color: #1a1f3a;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            text-align: center;
        }

        #bonusIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            z-index: 100;
            pointer-events: none;
            animation: floatBonus 1.5s ease-out forwards;
        }

        @keyframes floatBonus {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); }
        }

        .level-complete {
            animation: levelPulse 0.5s ease-in-out;
        }

        @keyframes levelPulse {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
            100% { filter: brightness(1); }
        }

        /* ===== NOVOS ESTILOS PARA CONSENTIMENTO ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .consent-card {
            background: linear-gradient(135deg, #2a2f4a, #1a1f3a);
            border-radius: 30px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            position: relative;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .consent-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .consent-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .consent-header .stars {
            font-size: 2em;
            letter-spacing: 5px;
        }

        .consent-section {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .consent-section h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .consent-text {
            font-size: 0.95em;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            max-height: 200px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .consent-text::-webkit-scrollbar {
            width: 5px;
        }

        .consent-text::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .consent-text::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }

        .cookie-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cookie-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cookie-option:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .cookie-option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ffd700;
        }

        .cookie-option label {
            flex: 1;
            cursor: pointer;
            font-weight: bold;
        }

        .cookie-option .mandatory {
            background: rgba(255, 0, 0, 0.3);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #ff9999;
        }

        .cookie-desc {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 32px;
            margin-top: -5px;
            margin-bottom: 10px;
        }

        .consent-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .consent-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .consent-btn.accept-all {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: #1a1f3a;
            border: none;
        }

        .consent-btn.accept-all:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .consent-btn:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        .privacy-link {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .privacy-link button {
            background: none;
            border: none;
            color: #ffd700;
            text-decoration: underline;
            cursor: pointer;
            padding: 5px;
            min-width: auto;
            font-size: 0.9em;
        }

        .privacy-link button:hover {
            color: #ffa500;
        }

        /* Banner de cookies simplificado (aparece depois) */
        .cookie-banner {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(26, 31, 58, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 1500;
            max-width: 400px;
            margin: 0 auto;
            animation: slideUp 0.3s ease-out;
        }

        .cookie-banner p {
            color: white;
            margin-bottom: 15px;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .cookie-banner-buttons {
            display: flex;
            gap: 10px;
        }

        .cookie-banner-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cookie-banner-btn.settings {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .cookie-banner-btn.accept {
            background: #ffd700;
            color: #1a1f3a;
        }

        @media (max-width: 480px) {
            #gameContainer { padding: 10px; }
            button { padding: 10px 15px; font-size: 0.9em; }
            .stat span { font-size: 1em; }
            .consent-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="statsBar">
            <div class="stat">⭐ Nível <span id="levelDisplay">1</span></div>
            <div class="stat">✨ Pontos <span id="scoreDisplay">0</span></div>
            <div class="stat">🎯 Meta <span id="goalDisplay">5</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="controls">
            <button id="newGameBtn">🔄 Nova Partida</button>
            <button id="nextLevelBtn" disabled>🔓 Próximo Nível</button>
        </div>

        <div id="shareButtons">
            <button class="share-btn x" id="shareX">𝕏 Compartilhar</button>
            <button class="share-btn facebook" id="shareFacebook">📘 Facebook</button>
            <button class="share-btn whatsapp" id="shareWhatsApp">📱 WhatsApp</button>
        </div>
    </div>

    <div id="messageBox"></div>

    <!-- Template para o popup de consentimento (será inserido via JavaScript) -->
    <div id="consentPopup"></div>

    <script>
        (function() {
            // ==================== CONFIGURAÇÃO DE CONSENTIMENTO ====================
            const CONSENT_KEY = 'starrush_consent';
            
            // Política de Privacidade completa
            const privacyPolicyText = `
                <h3>Política de Privacidade - Starrush</h3>
                <p><strong>Última atualização: Março 2026</strong></p>
                
                <h4>1. Introdução</h4>
                <p>Bem-vindo ao Starrush. Sua privacidade é importante para nós. Esta Política de Privacidade explica como coletamos, usamos e protegemos suas informações quando você joga nosso jogo.</p>
                
                <h4>2. Dados que Coletamos</h4>
                <p><strong>2.1 Dados de Jogo:</strong> Salvamos localmente no seu navegador (localStorage) seu progresso: nível atual, pontuação e estrelas coletadas. Estes dados nunca são enviados para nossos servidores.</p>
                <p><strong>2.2 Cookies e Tecnologias Semelhantes:</strong> Utilizamos cookies essenciais para o funcionamento do jogo e, com seu consentimento, cookies de marketing e análise para exibir anúncios personalizados do Google AdSense.</p>
                <p><strong>2.3 Google AdSense:</strong> Este jogo utiliza o Google AdSense, que pode coletar dados como:
                - Endereço IP
                - Tipo de navegador
                - Páginas visitadas
                - Cliques em anúncios
                - Identificadores de dispositivo
                Estes dados são usados para exibir anúncios relevantes e medir seu desempenho.</p>
                
                <h4>3. Como Usamos seus Dados</h4>
                <p>Seus dados são usados para:
                - Salvar seu progresso no jogo
                - Exibir anúncios personalizados (com seu consentimento)
                - Melhorar nossa experiência de jogo
                - Cumprir obrigações legais</p>
                
                <h4>4. Compartilhamento de Dados</h4>
                <p>Compartilhamos dados apenas com:
                - <strong>Google AdSense:</strong> Para exibição de anúncios (sujeito à sua escolha de cookies)
                - <strong>Redes sociais:</strong> Quando você escolhe compartilhar, o link é aberto no respectivo aplicativo</p>
                
                <h4>5. Seus Direitos</h4>
                <p>Você tem direito a:
                - Acessar seus dados salvos (via localStorage do navegador)
                - Recusar cookies não essenciais
                - Solicitar exclusão de dados (limpe o cache do navegador)
                - Retirar consentimento a qualquer momento</p>
                
                <h4>6. Segurança</h4>
                <p>Seus dados são armazenados apenas localmente em seu dispositivo. Não transmitimos dados para servidores externos além dos necessários para anúncios (Google AdSense).</p>
                
                <h4>7. Alterações nesta Política</h4>
                <p>Podemos atualizar esta política ocasionalmente. A versão mais recente estará sempre disponível neste popup.</p>
                
                <h4>8. Contato</h4>
                <p>Para questões sobre privacidade: privacidade@starrush.game</p>
                
                <h4>9. Conformidade com o Google AdSense</h4>
                <p>Este jogo está em conformidade com os Program Policies do Google AdSense, incluindo:
                - GDPR (para usuários na Europa)
                - CCPA (para usuários na Califórnia)
                - COPPA (proteção de crianças)
                - Políticas de conteúdo adequado</p>
            `;

            // Função para mostrar popup de consentimento completo
            function showConsentPopup() {
                const popupContainer = document.getElementById('consentPopup');
                
                const popupHTML = `
                    <div class="overlay" id="consentOverlay">
                        <div class="consent-card">
                            <div class="consent-header">
                                <div class="stars">✨ 🌟 ✨</div>
                                <h2>Starrush</h2>
                                <p>Suas preferências de privacidade</p>
                            </div>
                            
                            <div class="consent-section">
                                <h3>📋 Política de Privacidade</h3>
                                <div class="consent-text">
                                    ${privacyPolicyText}
                                </div>
                            </div>
                            
                            <div class="consent-section">
                                <h3>🍪 Configuração de Cookies</h3>
                                <div class="cookie-options">
                                    <div class="cookie-option" onclick="document.getElementById('essentialCookies').click()">
                                        <input type="checkbox" id="essentialCookies" checked disabled>
                                        <label>Cookies Essenciais <span class="mandatory">Obrigatórios</span></label>
                                    </div>
                                    <div class="cookie-desc">
                                        Necessários para o funcionamento do jogo (salvar progresso, manter sessão)
                                    </div>
                                    
                                    <div class="cookie-option" onclick="document.getElementById('analyticsCookies').click()">
                                        <input type="checkbox" id="analyticsCookies">
                                        <label>Cookies de Análise</label>
                                    </div>
                                    <div class="cookie-desc">
                                        Nos ajudam a entender como você usa o jogo para melhorá-lo
                                    </div>
                                    
                                    <div class="cookie-option" onclick="document.getElementById('marketingCookies').click()">
                                        <input type="checkbox" id="marketingCookies">
                                        <label>Cookies de Marketing</label>
                                    </div>
                                    <div class="cookie-desc">
                                        Usados pelo Google AdSense para exibir anúncios personalizados
                                    </div>
                                </div>
                            </div>
                            
                            <div class="consent-buttons">
                                <button class="consent-btn" id="acceptSelectedBtn">Aceitar Selecionados</button>
                                <button class="consent-btn accept-all" id="acceptAllBtn">Aceitar Tudo</button>
                            </div>
                            
                            <div class="privacy-link">
                                <button id="showPrivacyOnlyBtn">📄 Ver apenas a Política de Privacidade</button>
                            </div>
                        </div>
                    </div>
                `;
                
                popupContainer.innerHTML = popupHTML;
                
                // Event listeners para os botões
                document.getElementById('acceptAllBtn').addEventListener('click', () => {
                    saveConsent({
                        essential: true,
                        analytics: true,
                        marketing: true
                    });
                    document.getElementById('consentOverlay').remove();
                    initGameAfterConsent();
                });
                
                document.getElementById('acceptSelectedBtn').addEventListener('click', () => {
                    saveConsent({
                        essential: true,
                        analytics: document.getElementById('analyticsCookies').checked,
                        marketing: document.getElementById('marketingCookies').checked
                    });
                    document.getElementById('consentOverlay').remove();
                    initGameAfterConsent();
                });
                
                document.getElementById('showPrivacyOnlyBtn').addEventListener('click', () => {
                    showPrivacyOnly();
                });
            }

            // Função para mostrar apenas a política de privacidade
            function showPrivacyOnly() {
                const popupContainer = document.getElementById('consentPopup');
                
                const privacyHTML = `
                    <div class="overlay" id="consentOverlay">
                        <div class="consent-card">
                            <div class="consent-header">
                                <h2>📄 Política de Privacidade</h2>
                                <button class="consent-btn" id="backToConsentBtn" style="margin-top: 10px;">← Voltar</button>
                            </div>
                            
                            <div class="consent-section">
                                <div class="consent-text" style="max-height: 400px;">
                                    ${privacyPolicyText}
                                </div>
                            </div>
                            
                            <div class="consent-buttons">
                                <button class="consent-btn accept-all" id="acceptFromPrivacyBtn">Aceitar Todos os Cookies</button>
                            </div>
                        </div>
                    </div>
                `;
                
                popupContainer.innerHTML = privacyHTML;
                
                document.getElementById('backToConsentBtn').addEventListener('click', showConsentPopup);
                document.getElementById('acceptFromPrivacyBtn').addEventListener('click', () => {
                    saveConsent({
                        essential: true,
                        analytics: true,
                        marketing: true
                    });
                    document.getElementById('consentOverlay').remove();
                    initGameAfterConsent();
                });
            }

            // Função para mostrar banner simplificado (para quem já aceitou antes)
            function showCookieBanner() {
                const bannerHTML = `
                    <div class="cookie-banner" id="cookieBanner">
                        <p>🍪 Usamos cookies essenciais para o funcionamento do jogo e, com seu consentimento, cookies de marketing do Google AdSense para personalizar anúncios.</p>
                        <div class="cookie-banner-buttons">
                            <button class="cookie-banner-btn settings" id="cookieSettingsBtn">Configurar</button>
                            <button class="cookie-banner-btn accept" id="cookieAcceptBtn">Aceitar Todos</button>
                        </div>
                    </div>
                `;
                
                document.body.insertAdjacentHTML('beforeend', bannerHTML);
                
                document.getElementById('cookieSettingsBtn').addEventListener('click', () => {
                    document.getElementById('cookieBanner').remove();
                    showConsentPopup();
                });
                
                document.getElementById('cookieAcceptBtn').addEventListener('click', () => {
                    saveConsent({
                        essential: true,
                        analytics: true,
                        marketing: true
                    });
                    document.getElementById('cookieBanner').remove();
                });
            }

            // Salvar consentimento no localStorage
            function saveConsent(choices) {
                const consentData = {
                    ...choices,
                    timestamp: new Date().toISOString(),
                    version: '1.0'
                };
                localStorage.setItem(CONSENT_KEY, JSON.stringify(consentData));
                
                // Aqui você ativaria os serviços conforme as escolhas
                if (choices.marketing) {
                    enableAdSense(true);
                } else {
                    enableAdSense(false);
                }
            }

            // Verificar consentimento existente
            function checkConsent() {
                const saved = localStorage.getItem(CONSENT_KEY);
                if (saved) {
                    try {
                        const consent = JSON.parse(saved);
                        // Se já consentiu antes, mostra banner simplificado
                        if (consent.marketing) {
                            enableAdSense(true);
                            // Não mostra banner se já aceitou tudo antes
                        } else {
                            // Mostra banner para quem não aceitou marketing ainda
                            setTimeout(showCookieBanner, 2000);
                        }
                        return true;
                    } catch (e) {
                        return false;
                    }
                }
                return false;
            }

            // ==================== CONFIGURAÇÃO DO GOOGLE ADSENSE ====================
            function enableAdSense(enabled) {
                if (enabled) {
                    // Carregar AdSense apenas se o usuário consentiu
                    if (!document.getElementById('adsense-script')) {
                        const script = document.createElement('script');
                        script.id = 'adsense-script';
                        script.async = true;
                        script.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXX';
                        script.crossOrigin = 'anonymous';
                        document.head.appendChild(script);
                        
                        console.log('✅ Google AdSense carregado com consentimento do usuário');
                    }
                } else {
                    // Remover ou desativar AdSense
                    const adsenseScript = document.getElementById('adsense-script');
                    if (adsenseScript) {
                        adsenseScript.remove();
                        console.log('❌ Google AdSense desativado conforme preferência do usuário');
                    }
                }
            }

            // ==================== ÁUDIO ====================
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();

            function createCollectSound() {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            }

            function createLevelUpSound() {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            }

            function createBonusSound() {
                const oscillator1 = audioCtx.createOscillator();
                const oscillator2 = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator1.type = 'sine';
                oscillator1.frequency.setValueAtTime(659.25, audioCtx.currentTime);
                
                oscillator2.type = 'sine';
                oscillator2.frequency.setValueAtTime(830.61, audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                
                oscillator1.connect(gainNode);
                oscillator2.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator1.start();
                oscillator2.start();
                oscillator1.stop(audioCtx.currentTime + 0.3);
                oscillator2.stop(audioCtx.currentTime + 0.3);
            }

            function createGameOverSound() {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.3);
                
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4);
            }

            // ==================== VARIÁVEIS DO JOGO ====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            const levelDisplay = document.getElementById('levelDisplay');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const goalDisplay = document.getElementById('goalDisplay');
            const newGameBtn = document.getElementById('newGameBtn');
            const nextLevelBtn = document.getElementById('nextLevelBtn');
            const messageBox = document.getElementById('messageBox');
            
            const shareXBtn = document.getElementById('shareX');
            const shareFacebookBtn = document.getElementById('shareFacebook');
            const shareWhatsAppBtn = document.getElementById('shareWhatsApp');

            let gameState = {
                level: 1,
                score: 0,
                stars: [],
                obstacles: [],
                player: { x: 200, y: 200, radius: 15 },
                gameActive: true,
                goalPerLevel: 5,
                baseSpeed: 1,
                starsCollected: 0,
                bonusAvailable: true
            };

            // ==================== FUNÇÕES DO JOGO ====================
            function showMessage(text, duration = 2000) {
                messageBox.style.opacity = '1';
                messageBox.textContent = text;
                setTimeout(() => {
                    messageBox.style.opacity = '0';
                }, duration);
            }

            function showBonusAnimation(text) {
                const bonus = document.createElement('div');
                bonus.id = 'bonusIndicator';
                bonus.textContent = text;
                document.body.appendChild(bonus);
                setTimeout(() => bonus.remove(), 1500);
            }

            function createStar() {
                return {
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    radius: 10,
                    collected: false,
                    pulsePhase: Math.random() * Math.PI * 2
                };
            }

            function createObstacle() {
                if (gameState.level > 1 && Math.random() < 0.3 + (gameState.level * 0.05)) {
                    return {
                        x: Math.random() * (canvas.width - 30) + 15,
                        y: Math.random() * (canvas.height - 30) + 15,
                        radius: 12,
                        speedX: (Math.random() - 0.5) * gameState.baseSpeed * gameState.level,
                        speedY: (Math.random() - 0.5) * gameState.baseSpeed * gameState.level
                    };
                }
                return null;
            }

            function initLevel() {
                const numStars = 5 + gameState.level * 2;
                const numObstacles = Math.floor(gameState.level / 2);
                
                gameState.stars = [];
                gameState.obstacles = [];
                
                for (let i = 0; i < numStars; i++) {
                    gameState.stars.push(createStar());
                }
                
                for (let i = 0; i < numObstacles; i++) {
                    const obs = createObstacle();
                    if (obs) gameState.obstacles.push(obs);
                }
                
                gameState.goalPerLevel = 5 + (gameState.level - 1) * 2;
                gameState.starsCollected = 0;
                
                gameState.player.x = canvas.width / 2;
                gameState.player.y = canvas.height / 2;
                
                updateDisplay();
            }

            function updateDisplay() {
                levelDisplay.textContent = gameState.level;
                scoreDisplay.textContent = gameState.score;
                goalDisplay.textContent = `${gameState.starsCollected}/${gameState.goalPerLevel}`;
                
                nextLevelBtn.disabled = gameState.starsCollected < gameState.goalPerLevel;
            }

            function saveGame() {
                const saveData = {
                    level: gameState.level,
                    score: gameState.score,
                    starsCollected: gameState.starsCollected
                };
                localStorage.setItem('starrush_save', JSON.stringify(saveData));
            }

            function loadGame() {
                const saved = localStorage.getItem('starrush_save');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        gameState.level = data.level;
                        gameState.score = data.score;
                        gameState.starsCollected = data.starsCollected;
                        gameState.goalPerLevel = 5 + (gameState.level - 1) * 2;
                    } catch (e) {
                        console.log('Erro ao carregar save');
                    }
                }
                updateDisplay();
            }

            function checkCollisions() {
                gameState.stars.forEach(star => {
                    if (!star.collected) {
                        const dx = gameState.player.x - star.x;
                        const dy = gameState.player.y - star.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < gameState.player.radius + star.radius) {
                            star.collected = true;
                            gameState.score += 10;
                            gameState.starsCollected++;
                            
                            createCollectSound();
                            
                            if (gameState.starsCollected < gameState.goalPerLevel) {
                                gameState.stars.push(createStar());
                            }
                            
                            updateDisplay();
                            saveGame();
                        }
                    }
                });

                gameState.obstacles.forEach(obs => {
                    const dx = gameState.player.x - obs.x;
                    const dy = gameState.player.y - obs.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < gameState.player.radius + obs.radius && gameState.gameActive) {
                        gameState.gameActive = false;
                        createGameOverSound();
                        showMessage('💫 Game Over... Tente novamente!');
                        
                        // Verificar consentimento antes de mostrar anúncio
                        const consent = JSON.parse(localStorage.getItem(CONSENT_KEY) || '{}');
                        if (consent.marketing) {
                            showMessage('📺 Exibindo anúncio (Google AdSense)');
                        } else {
                            showMessage('📺 Anúncio não exibido (sem consentimento)');
                        }
                    }
                });

                if (gameState.starsCollected >= gameState.goalPerLevel && gameState.gameActive) {
                    gameState.level++;
                    gameState.score += 50;
                    createLevelUpSound();
                    showMessage(`🎉 Nível ${gameState.level} desbloqueado!`);
                    
                    canvas.classList.add('level-complete');
                    setTimeout(() => canvas.classList.remove('level-complete'), 500);
                    
                    initLevel();
                    saveGame();
                }
            }

            function updateObstacles() {
                gameState.obstacles.forEach(obs => {
                    obs.x += obs.speedX;
                    obs.y += obs.speedY;
                    
                    if (obs.x < obs.radius || obs.x > canvas.width - obs.radius) {
                        obs.speedX *= -1;
                    }
                    if (obs.y < obs.radius || obs.y > canvas.height - obs.radius) {
                        obs.speedY *= -1;
                    }
                });
            }

            // ==================== CONTROLES ====================
            let mouseDown = false;

            function handleStart(e) {
                e.preventDefault();
                mouseDown = true;
                if (!gameState.gameActive) return;
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                updatePlayerPosition(e);
            }

            function handleMove(e) {
                e.preventDefault();
                if (!mouseDown || !gameState.gameActive) return;
                updatePlayerPosition(e);
            }

            function handleEnd(e) {
                e.preventDefault();
                mouseDown = false;
            }

            function updatePlayerPosition(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                let clientX, clientY;
                
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                let x = (clientX - rect.left) * scaleX;
                let y = (clientY - rect.top) * scaleY;
                
                gameState.player.x = Math.max(gameState.player.radius, Math.min(canvas.width - gameState.player.radius, x));
                gameState.player.y = Math.max(gameState.player.radius, Math.min(canvas.height - gameState.player.radius, y));
            }

            // ==================== COMPARTILHAMENTO ====================
            function getShareText() {
                return encodeURIComponent(
                    `✨ Estou no nível ${gameState.level} do Starrush com ${gameState.score} pontos! Venha relaxar e coletar estrelas comigo! 🌟`
                );
            }

            function getGameUrl() {
                return encodeURIComponent(window.location.href);
            }

            function handleShare(platform) {
                if (!gameState.bonusAvailable) {
                    showMessage('⏳ Aguarde para ganhar outro bônus!');
                    return;
                }

                let shareUrl = '';
                const text = getShareText();
                const url = getGameUrl();

                switch(platform) {
                    case 'x':
                        shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
                        break;
                    case 'facebook':
                        shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`;
                        break;
                    case 'whatsapp':
                        shareUrl = `https://api.whatsapp.com/send?text=${text}%20${url}`;
                        break;
                }

                if (shareUrl) {
                    window.open(shareUrl, '_blank', 'width=600,height=400');
                    
                    gameState.score += 25;
                    gameState.bonusAvailable = false;
                    createBonusSound();
                    showBonusAnimation('+25 BÔNUS!');
                    showMessage('🎁 Bônus de compartilhamento! +25 pontos');
                    
                    updateDisplay();
                    saveGame();
                    
                    setTimeout(() => {
                        gameState.bonusAvailable = true;
                        showMessage('✨ Novo bônus disponível! Compartilhe novamente!');
                    }, 30000);
                }
            }

            // ==================== RENDERIZAÇÃO ====================
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                for (let i = 0; i < 50; i++) {
                    if (i % 2 === 0) continue;
                    ctx.beginPath();
                    ctx.arc((i * 37) % canvas.width, (i * 23) % canvas.height, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                gameState.obstacles.forEach(obs => {
                    ctx.beginPath();
                    ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
                
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 20;
                gameState.stars.forEach(star => {
                    if (!star.collected) {
                        const scale = 1 + Math.sin(Date.now() * 0.005 + star.pulsePhase) * 0.1;
                        
                        ctx.save();
                        ctx.translate(star.x, star.y);
                        ctx.scale(scale, scale);
                        
                        ctx.beginPath();
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * 72 - 90) * Math.PI / 180;
                            const x1 = Math.cos(angle) * star.radius;
                            const y1 = Math.sin(angle) * star.radius;
                            const x2 = Math.cos(angle + 36 * Math.PI / 180) * (star.radius * 0.4);
                            const y2 = Math.sin(angle + 36 * Math.PI / 180) * (star.radius * 0.4);
                            
                            if (i === 0) {
                                ctx.moveTo(x1, y1);
                            } else {
                                ctx.lineTo(x1, y1);
                            }
                            ctx.lineTo(x2, y2);
                        }
                        ctx.closePath();
                        
                        ctx.fillStyle = '#ffd700';
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        
                        ctx.restore();
                    }
                });
                
                ctx.shadowColor = '#4a90e2';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(gameState.player.x, gameState.player.y, gameState.player.radius, 0, Math.PI * 2);
                
                const gradient = ctx.createRadialGradient(
                    gameState.player.x - 5, gameState.player.y - 5, 5,
                    gameState.player.x, gameState.player.y, gameState.player.radius + 5
                );
                gradient.addColorStop(0, '#4a90e2');
                gradient.addColorStop(1, '#9b59b6');
                
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(gameState.player.x - 5, gameState.player.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(gameState.player.x + 5, gameState.player.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(gameState.player.x - 6, gameState.player.y - 6, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(gameState.player.x + 4, gameState.player.y - 6, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                
                if (!gameState.gameActive) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('💫 GAME OVER', canvas.width/2, canvas.height/2);
                }
            }

            function gameLoop() {
                if (gameState.gameActive) {
                    updateObstacles();
                    checkCollisions();
                }
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ==================== INICIALIZAÇÃO COM CONSENTIMENTO ====================
            function initGameAfterConsent() {
                loadGame();
                initLevel();
                gameLoop();
                
                // Event listeners do jogo
                canvas.addEventListener('mousedown', handleStart);
                canvas.addEventListener('mousemove', handleMove);
                canvas.addEventListener('mouseup', handleEnd);
                canvas.addEventListener('mouseleave', handleEnd);
                
                canvas.addEventListener('touchstart', handleStart, { passive: false });
                canvas.addEventListener('touchmove', handleMove, { passive: false });
                canvas.addEventListener('touchend', handleEnd);
                canvas.addEventListener('touchcancel', handleEnd);

                newGameBtn.addEventListener('click', () => {
                    createGameOverSound();
                    
                    gameState.level = 1;
                    gameState.score = 0;
                    gameState.starsCollected = 0;
                    gameState.gameActive = true;
                    gameState.bonusAvailable = true;
                    
                    initLevel();
                    saveGame();
                    showMessage('🌟 Nova jornada começou!');
                    
                    const consent = JSON.parse(localStorage.getItem(CONSENT_KEY) || '{}');
                    if (consent.marketing) {
                        showMessage('📺 Exibindo anúncio (Google AdSense)');
                    } else {
                        showMessage('📺 Anúncio não exibido (sem consentimento)');
                    }
                });

                nextLevelBtn.addEventListener('click', () => {
                    if (gameState.starsCollected >= gameState.goalPerLevel) {
                        createLevelUpSound();
                        gameState.level++;
                        gameState.score += 50;
                        initLevel();
                        saveGame();
                        showMessage(`🎉 Avançou para o nível ${gameState.level}!`);
                    }
                });

                shareXBtn.addEventListener('click', () => handleShare('x'));
                shareFacebookBtn.addEventListener('click', () => handleShare('facebook'));
                shareWhatsAppBtn.addEventListener('click', () => handleShare('whatsapp'));

                // Ativar áudio
                document.body.addEventListener('click', function initAudio() {
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                }, { once: true });
            }

            // Verificar consentimento ao carregar a página
            if (!checkConsent()) {
                showConsentPopup();
            } else {
                initGameAfterConsent();
            }
        })();
    </script>
</body>
</html>
