<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starrush - Stellar Infinity</title>
    
    <link rel="manifest" id="pwa-manifest">
    <meta name="theme-color" content="#1a1f3a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35' fill='%23ffd700' stroke='%23ffa500' stroke-width='3'/%3E%3C/svg%3E">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* CSS COMPLETO E OTIMIZADO */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #0a0f2a, #1a1f3a); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow: hidden; 
            touch-action: none;
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        #statsBar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 25px;
            border: 1px solid rgba(255,215,0,0.2);
        }

        .stat { text-align: center; color: #fff; font-size: 0.7em; font-weight: bold; text-transform: uppercase; }
        .stat span { display: block; font-size: 1.4em; color: #ffd700; margin-top: 4px; }

        #gameCanvas {
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            border-radius: 30px;
            border: 4px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: none;
        }

        #livesContainer { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; height: 30px; }
        .star-life { font-size: 1.8em; filter: drop-shadow(0 0 5px gold); transition: 0.4s; }
        .star-life.lost { opacity: 0.15; filter: grayscale(1) blur(1px); transform: scale(0.8); }

        #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        #bonusBtn { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; }

        #installBtn {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
            background: #ffd700;
            color: #000;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Modais */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: #161b33;
            width: 85%; max-width: 400px;
            padding: 30px; border-radius: 40px;
            border: 2px solid #ffd700;
            color: white; text-align: center;
        }

        /* Efeitos de Skin */
        .furia-mode { border: 4px solid #ff0000 !important; box-shadow: 0 0 40px rgba(255,0,0,0.6) !important; }
        .luminara-aura { box-shadow: 0 0 40px rgba(0,255,255,0.4) !important; }
        
        #messageBox {
            position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.9); color: #000;
            padding: 10px 25px; border-radius: 50px;
            font-weight: bold; z-index: 10000; opacity: 0; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div id="messageBox"></div>
    <button id="installBtn">📲 INSTALL STARRUSH</button>

    <div id="gameContainer">
        <div id="livesContainer"></div>

        <div id="statsBar">
            <div class="stat">Stars<span id="scoreDisplay">0</span></div>
            <div class="stat">Combo<span id="comboDisplay">x1</span></div>
            <div class="stat">Record<span id="recordDisplay">0</span></div>
            <div class="stat">Days<span id="daysDisplay">0/365</span></div>
            <div class="stat">Total<span id="totalDisplay">0</span></div>
        </div>

        <canvas id="gameCanvas" width="800" height="800"></canvas>

        <div id="controls">
            <button id="newGameBtn">PLAY</button>
            <button id="bonusBtn">GIFT</button>
            <button id="skinBtn">SKINS</button>
            <button id="rankBtn">RANK</button>
        </div>
    </div>

    <script>
        (function() {
            // --- DATA CORE ---
            let game = {
                score: 0, combo: 1, lives: 3, active: false,
                stars: [], obstacles: [], particles: [],
                player: { x: 400, y: 400, r: 25, targetX: 400, targetY: 400 },
                chal: { stars: 0, combo: 0, shared: 0 }
            };

            let storage = JSON.parse(localStorage.getItem('starrush_v4')) || {
                record: 0, totalStars: 0, totalDays: 0, lastDate: null,
                skins: ['classic'], currentSkin: 'classic', history: {},
                country: 'US'
            };

            const translations = {
                en: {
                    furia_msg: "🔴 Furia won... But tomorrow is a new day.",
                    gift_sent: "✨ Luminara sent you a gift!",
                    unlock: "New skin unlocked: ",
                    no_bonus: "❌ Furia blocked your bonuses."
                },
                pt: {
                    furia_msg: "🔴 A Fúria venceu... Mas amanhã é um novo dia.",
                    gift_sent: "✨ Luminara enviou um presente!",
                    unlock: "Nova skin desbloqueada: ",
                    no_bonus: "❌ A Fúria bloqueou seus bônus."
                }
            };
            const lang = navigator.language.startsWith('pt') ? 'pt' : 'en';
            const msg = (k) => translations[lang][k];

            // --- ADS LOGIC (RICHADS / PROPELLER / ROI) ---
            const ADS = {
                init: async () => {
                    try {
                        const r = await fetch('https://ipapi.co/json/');
                        const d = await r.json();
                        storage.country = d.country_code;
                    } catch(e) {}
                },
                trigger: (type) => {
                    console.log(`Triggering ${type} ad for ${storage.country}`);
                    // Simulação da lógica de injeção conforme país
                    if (storage.country === 'US') {
                        // Injetar RichAds
                    } else {
                        // Injetar PropellerAds
                    }
                }
            };
            ADS.init();

            // --- CANVAS ENGINE ---
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            function createStar() {
                game.stars.push({
                    x: Math.random() * 740 + 30,
                    y: Math.random() * 740 + 30,
                    r: 12,
                    a: 0,
                    pulse: Math.random() * 10
                });
            }

            function createObs() {
                let speedMult = 1 + (game.score / 1000);
                game.obstacles.push({
                    x: Math.random() * 800,
                    y: -50,
                    vx: (Math.random() - 0.5) * 6 * speedMult,
                    vy: (Math.random() * 4 + 4) * speedMult,
                    r: 20
                });
            }

            function spawnParticle(x, y, color) {
                for(let i=0; i<8; i++) {
                    game.particles.push({
                        x, y, color,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1.0
                    });
                }
            }

            // --- LOGICA DE SKINS & PODERES ---
            function applySkin() {
                const s = storage.currentSkin;
                game.lives = 3;
                canvas.className = '';
                
                if (s === 'luminara') {
                    game.lives = 4;
                    canvas.classList.add('luminara-aura');
                }
                if (s === 'furia') {
                    game.lives = 1;
                    canvas.classList.add('furia-mode');
                }
                updateLives();
            }

            // --- CORREÇÃO OBRIGATÓRIA: BUG DA FURIA ---
            function die() {
                game.active = false;
                ADS.trigger('game_over');
                
                // Salvar Recorde
                if (game.score > storage.record) storage.record = game.score;
                storage.totalStars += Math.floor(game.score);
                
                checkDailyProgress();
                save();
                
                // Trava de bônus: O modal de bônus checa game.active
                alert(msg('furia_msg'));
                updateUI();
            }

            // --- CORREÇÃO OBRIGATÓRIA: 365 DIAS & DESAFIOS PROGRESSIVOS ---
            function checkDailyProgress() {
                const today = new Date().toISOString().split('T')[0];
                const target = 500 + (storage.totalDays * 10);
                
                // Se completou as metas hoje
                if (game.chal.stars >= target && game.chal.combo >= 100) {
                    if (storage.lastDate !== today) {
                        storage.totalDays++;
                        storage.lastDate = today;
                        
                        // Milestones
                        if (storage.totalDays === 7) unlock('neon');
                        if (storage.totalDays === 30) unlock('brilha');
                        if (storage.totalDays === 100) unlock('luminara');
                        if (storage.totalDays === 365) unlock('furia');

                        // Histórico Mensal
                        const mKey = today.substring(0, 7);
                        if (!storage.history[mKey]) storage.history[mKey] = { d: 0, s: 0 };
                        storage.history[mKey].d++;
                        storage.history[mKey].s += game.chal.stars;
                    }
                }
            }

            function unlock(id) {
                if (!storage.skins.includes(id)) {
                    storage.skins.push(id);
                    notify(msg('unlock') + id);
                }
            }

            // --- LOOP PRINCIPAL ---
            function update() {
                if (!game.active) return;

                // Suavização do movimento (EUA Style - High Performance)
                game.player.x += (game.player.targetX - game.player.x) * 0.2;
                game.player.y += (game.player.targetY - game.player.y) * 0.2;

                // Estrelas
                game.stars.forEach((s, i) => {
                    let d = Math.hypot(game.player.x - s.x, game.player.y - s.y);
                    if (d < game.player.r + s.r) {
                        let pts = 10 * game.combo;
                        if (storage.currentSkin === 'furia') pts *= 3;
                        if (storage.currentSkin === 'brilha') pts *= 1.2;
                        
                        game.score += pts;
                        game.chal.stars++;
                        game.combo++;
                        spawnParticle(s.x, s.y, storage.currentSkin === 'brilha' ? 'gold' : 'yellow');
                        game.stars.splice(i, 1);
                        createStar();
                    }
                });

                // Obstáculos
                game.obstacles.forEach((o, i) => {
                    o.x += o.vx; o.y += o.vy;
                    if (o.x < 0 || o.x > 800) o.vx *= -1;
                    if (o.y > 850) game.obstacles.splice(i, 1);

                    let d = Math.hypot(game.player.x - o.x, game.player.y - o.y);
                    if (d < game.player.r + o.r) {
                        game.lives--;
                        game.combo = 1;
                        game.obstacles.splice(i, 1);
                        updateLives();
                        if (game.lives <= 0) die();
                    }
                });

                // Partículas
                game.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if (p.life <= 0) game.particles.splice(i, 1);
                });

                if (Math.random() < 0.03) createObs();
                if (game.stars.length < 5) createStar();

                game.chal.combo = Math.max(game.chal.combo, game.combo);
            }

            function render() {
                ctx.clearRect(0, 0, 800, 800);

                // Player
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = (storage.currentSkin === 'furia') ? 'red' : 'cyan';
                ctx.fillStyle = '#4a90e2';
                ctx.beginPath();
                ctx.arc(game.player.x, game.player.y, game.player.r, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();

                // Stars
                game.stars.forEach(s => {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r + Math.sin(Date.now()*0.01)*2, 0, Math.PI*2);
                    ctx.fill();
                });

                // Obs
                game.obstacles.forEach(o => {
                    ctx.fillStyle = '#ff4b2b';
                    ctx.beginPath();
                    ctx.arc(o.x, o.y, o.r, 0, Math.PI*2);
                    ctx.fill();
                });

                // Particles
                game.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 5, 5);
                });
                ctx.globalAlpha = 1;

                updateUI();
                requestAnimationFrame(render);
            }

            // --- UI HELPERS ---
            function updateUI() {
                document.getElementById('scoreDisplay').innerText = Math.floor(game.score);
                document.getElementById('recordDisplay').innerText = Math.floor(storage.record);
                document.getElementById('comboDisplay').innerText = `x${game.combo}`;
                document.getElementById('daysDisplay').innerText = `${storage.totalDays}/365`;
                document.getElementById('totalDisplay').innerText = storage.totalStars;
            }

            function updateLives() {
                const container = document.getElementById('livesContainer');
                container.innerHTML = '';
                let max = (storage.currentSkin === 'luminara') ? 4 : (storage.currentSkin === 'furia' ? 1 : 3);
                for(let i=0; i<max; i++) {
                    const s = document.createElement('span');
                    s.className = `star-life ${i >= game.lives ? 'lost' : ''}`;
                    s.innerText = '🌟';
                    container.appendChild(s);
                }
            }

            function notify(t) {
                const b = document.getElementById('messageBox');
                b.innerText = t; b.style.opacity = 1;
                setTimeout(() => b.style.opacity = 0, 3000);
            }

            function save() {
                localStorage.setItem('starrush_v4', JSON.stringify(storage));
            }

            // --- INPUTS ---
            canvas.addEventListener('mousemove', e => {
                let r = canvas.getBoundingClientRect();
                game.player.targetX = (e.clientX - r.left) * (800 / r.width);
                game.player.targetY = (e.clientY - r.top) * (800 / r.height);
            });

            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                let r = canvas.getBoundingClientRect();
                game.player.targetX = (e.touches[0].clientX - r.left) * (800 / r.width);
                game.player.targetY = (e.touches[0].clientY - r.top) * (800 / r.height);
            }, {passive: false});

            document.getElementById('newGameBtn').onclick = () => {
                if (game.active) return;
                game.active = true;
                game.score = 0; game.combo = 1; game.chal.stars = 0;
                game.stars = []; game.obstacles = [];
                applySkin();
                ADS.trigger('start_game');
            };

            document.getElementById('skinBtn').onclick = () => {
                let s = prompt("Skins unlocked: " + storage.skins.join(', ') + "\nType skin name to equip:");
                if (storage.skins.includes(s)) {
                    storage.currentSkin = s;
                    save();
                    notify("Equipped: " + s);
                }
            };

            // --- PWA & BOOT ---
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                let deferred = e;
                setTimeout(() => {
                    document.getElementById('installBtn').style.display = 'block';
                    document.getElementById('installBtn').onclick = () => {
                        deferred.prompt();
                        document.getElementById('installBtn').style.display = 'none';
                    };
                }, 30000);
            });

            setInterval(update, 1000/60);
            render();

        })();
    </script>
</body>
</html>
