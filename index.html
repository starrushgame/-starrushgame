<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Starrush - Infinito Estelar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0f2a, #1a1f3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            position: relative;
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 15px;
            position: relative;
            z-index: 1;
        }

        #statsBar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            padding: 12px 10px;
            margin-bottom: 15px;
            color: white;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.85em;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .stat span {
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 1.1em;
            margin-top: 3px;
        }

        #gameCanvas {
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, #2a2f4a, #0f142a);
            border-radius: 20px;
            display: block;
            margin: 0 auto 15px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            touch-action: none;
        }

        #comboBar {
            background: rgba(255, 215, 0, 0.2);
            border-radius: 30px;
            height: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        #comboFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            transition: width 0.3s;
            border-radius: 30px;
        }

        #comboText {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 0.8em;
            line-height: 20px;
            text-shadow: 1px 1px 2px black;
        }

        #controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 12px;
        }

        button {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            flex: 1 1 auto;
            min-width: 90px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.25);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
        }

        #shareButtons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .share-btn {
            flex: 1;
            min-width: 60px;
            height: 50px;
            padding: 0;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
        }

        .share-btn svg {
            width: 40px;
            height: 40px;
            transition: transform 0.2s;
        }

        .share-btn:hover svg {
            transform: scale(1.1);
        }

        .share-btn:active svg {
            transform: scale(0.95);
        }

        #x-icon { fill: #000000; }
        #facebook-icon { fill: #1877f2; }
        #whatsapp-icon { fill: #25d366; }

        #achievementsBar {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 8px 0;
            margin-top: 8px;
            scrollbar-width: thin;
            scrollbar-color: #ffd700 #2a2f4a;
        }

        #achievementsBar::-webkit-scrollbar {
            height: 4px;
        }

        #achievementsBar::-webkit-scrollbar-track {
            background: #2a2f4a;
            border-radius: 10px;
        }

        #achievementsBar::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }

        .achievement-icon {
            min-width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            border: 2px solid rgba(255, 215, 0, 0.5);
            position: relative;
            cursor: pointer;
        }

        .achievement-icon.locked {
            opacity: 0.5;
            filter: grayscale(0.8);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .achievement-icon span {
            font-size: 0.5em;
            position: absolute;
            bottom: -15px;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            padding: 2px 5px;
            border-radius: 10px;
            display: none;
        }

        .achievement-icon:hover span {
            display: block;
        }

        #messageBox {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            color: #1a1f3a;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            text-align: center;
            font-size: 0.95em;
        }

        #bonusIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
            font-weight: bold;
            color: gold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            z-index: 100;
            pointer-events: none;
            animation: floatBonus 1.5s ease-out forwards;
        }

        @keyframes floatBonus {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -70%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); }
        }

        #dailyChallenge {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid rgba(255, 215, 0, 0.3);
            font-size: 0.9em;
        }

        .challenge-item {
            display: flex;
            justify-content: space-between;
            color: white;
            padding: 5px 0;
        }

        .challenge-progress {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 2px 10px;
        }

        #rankingBtn, #skinBtn, #bonusBtn {
            background: linear-gradient(45deg, #4a90e2, #9b59b6);
        }

        #bonusBtn {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: #1a1f3a;
            font-weight: bold;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: linear-gradient(135deg, #2a2f4a, #1a1f3a);
            border-radius: 30px;
            padding: 20px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid rgba(255,215,0,0.3);
            color: white;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .ranking-position {
            font-weight: bold;
            color: #ffd700;
        }

        /* Overlay de consentimento */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .consent-card {
            background: linear-gradient(135deg, #2a2f4a, #1a1f3a);
            border-radius: 30px;
            padding: 25px;
            max-width: 500px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(255, 215, 0, 0.5);
            color: white;
            position: relative;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .consent-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .consent-header h2 {
            font-size: 2em;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .consent-header p {
            font-size: 1.1em;
            color: #ffd700;
        }

        .comparison-table {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .comparison-col {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            border-radius: 20px;
        }

        .comparison-col.accept {
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
        }

        .comparison-col.reject {
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff6666;
        }

        .comparison-col h3 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .comparison-col.accept h3 {
            color: #00ff00;
        }

        .comparison-col.reject h3 {
            color: #ff6666;
        }

        .comparison-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            font-size: 1em;
        }

        .comparison-icon {
            font-size: 1.3em;
            min-width: 30px;
        }

        .consent-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .consent-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .consent-btn.accept {
            background: linear-gradient(45deg, #00aa00, #00ff00);
            color: #1a1f3a;
            border: 2px solid white;
        }

        .consent-btn.accept:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.4);
        }

        .consent-btn.reject {
            background: rgba(255, 100, 100, 0.3);
            color: white;
            border: 2px solid #ff6666;
        }

        .consent-btn.reject:hover {
            background: rgba(255, 100, 100, 0.5);
        }

        /* ===== TELA DE TUTORIAL ===== */
        .tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2500;
            animation: fadeIn 0.5s ease-out;
        }

        .tutorial-card {
            background: linear-gradient(135deg, #1a1f3a, #2a2f4a);
            border-radius: 40px;
            padding: 25px;
            max-width: 500px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            border: 3px solid #ffd700;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
            color: white;
            animation: slideUp 0.5s ease-out;
        }

        .tutorial-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .tutorial-header h2 {
            font-size: 2.2em;
            background: linear-gradient(45deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .tutorial-header .subtitle {
            color: #ffd700;
            font-size: 1.1em;
        }

        .tutorial-preview {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .preview-canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, #2a2f4a, #0f142a);
            border-radius: 15px;
            overflow: hidden;
        }

        #previewCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .preview-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #ffd700;
            border: 1px solid #ffd700;
        }

        .tutorial-section {
            margin: 20px 0;
        }

        .tutorial-section h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .tutorial-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: transform 0.2s;
        }

        .tutorial-item:hover {
            transform: scale(1.02);
            border-color: #ffd700;
        }

        .tutorial-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }

        .tutorial-item h4 {
            color: #ffd700;
            margin-bottom: 5px;
            font-size: 1em;
        }

        .tutorial-item p {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.8);
        }

        .tutorial-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            border-left: 4px solid #ffd700;
        }

        .feature-icon {
            font-size: 1.5em;
            min-width: 40px;
            text-align: center;
        }

        .feature-text {
            flex: 1;
        }

        .feature-text strong {
            color: #ffd700;
            display: block;
            margin-bottom: 3px;
        }

        .feature-text span {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
        }

        .tutorial-start {
            background: linear-gradient(45deg, #ffd700, #ffa500);
            color: #1a1f3a;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid white;
        }

        .tutorial-start:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .footer-note {
            text-align: center;
            font-size: 0.85em;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-note a {
            color: #ffd700;
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            #statsBar { font-size: 0.7em; }
            button { padding: 8px 10px; font-size: 0.8em; }
            .stat span { font-size: 0.9em; }
            .share-btn svg { width: 35px; height: 35px; }
            .comparison-table { flex-direction: column; }
            .tutorial-grid { grid-template-columns: 1fr; }
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .progress-bar {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            z-index: 2000;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="statsBar">
            <div class="stat">⭐ Estrelas<span id="scoreDisplay">0</span></div>
            <div class="stat">🔥 Combo<span id="comboDisplay">x1</span></div>
            <div class="stat">💫 Recorde<span id="recordDisplay">0</span></div>
            <div class="stat">🎯 Desafio<span id="challengeDisplay">0/5</span></div>
        </div>

        <div id="comboBar">
            <div id="comboFill"></div>
            <div id="comboText">🔥 COMBO x1</div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="controls">
            <button id="newGameBtn">🔄 Nova Partida</button>
            <button id="rankingBtn" onclick="window.showRanking?.()">🏆 Ranking</button>
            <button id="skinBtn" onclick="window.showSkins?.()">🎨 Skins</button>
            <button id="bonusBtn">🎁 Bônus</button>
            <button id="musicBtn">🎵 Música</button>
        </div>

        <div id="dailyChallenge">
            <div style="color:#ffd700; text-align:center; margin-bottom:5px;">📅 Desafios de Hoje</div>
            <div class="challenge-item" id="challenge1">
                <span>🌟 Coletar 30 estrelas</span>
                <span class="challenge-progress" id="challenge1Progress">0/30</span>
            </div>
            <div class="challenge-item" id="challenge2">
                <span>🔥 Combo x5</span>
                <span class="challenge-progress" id="challenge2Progress">0/5</span>
            </div>
            <div class="challenge-item" id="challenge3">
                <span>📱 Compartilhar 1 vez</span>
                <span class="challenge-progress" id="challenge3Progress">0/1</span>
            </div>
        </div>

        <!-- Botões de compartilhamento com LOGOS -->
        <div id="shareButtons">
            <button class="share-btn" id="shareX" title="Compartilhar no X">
                <svg viewBox="0 0 24 24" id="x-icon">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </button>
            <button class="share-btn" id="shareFacebook" title="Compartilhar no Facebook">
                <svg viewBox="0 0 24 24" id="facebook-icon">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
            </button>
            <button class="share-btn" id="shareWhatsApp" title="Compartilhar no WhatsApp">
                <svg viewBox="0 0 24 24" id="whatsapp-icon">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                    <path d="M12 0C5.373 0 0 5.373 0 12c0 2.084.534 4.046 1.472 5.768L.058 23.226c-.099.396.248.743.644.644l5.458-1.414C7.954 23.466 9.92 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.85 0-3.602-.511-5.119-1.407l-.367-.22-3.388.877.877-3.388-.22-.367C2.511 15.602 2 13.85 2 12 2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/>
                </svg>
            </button>
        </div>

        <div id="achievementsBar"></div>
    </div>

    <div id="messageBox"></div>

    <!-- Container para o popup de consentimento -->
    <div id="consentPopup"></div>

    <div id="modalContainer"></div>

            // ==================== GEOLOCALIZAÇÃO ====================
            async function detectUserLocation() {
                const cached = localStorage.getItem('user_location_cached');
                if (cached) {
                    try {
                        const data = JSON.parse(cached);
                        if (Date.now() - data.timestamp < 86400000) {
                            return data.location;
                        }
                    } catch (e) {}
                }
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);
                    
                    const response = await fetch('https://ipapi.co/json/', {
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    
                    const location = {
                        country: data.country_code || 'unknown',
                        region: data.region_code || 'unknown',
                        inEEA: gdprCountries.includes(data.country_code) || false,
                        timestamp: Date.now()
                    };
                    
                    localStorage.setItem('user_location_cached', JSON.stringify({
                        location: location,
                        timestamp: Date.now()
                    }));
                    
                    return location;
                } catch (e) {
                    const lang = navigator.language || navigator.userLanguage;
                    let fallbackCountry = 'unknown';
                    
                    if (lang.includes('pt-BR') || lang.includes('pt')) {
                        fallbackCountry = 'BR';
                    } else if (lang.includes('en-US')) {
                        fallbackCountry = 'US';
                    } else if (lang.includes('es')) {
                        fallbackCountry = 'ES';
                    }
                    
                    return {
                        country: fallbackCountry,
                        region: 'unknown',
                        inEEA: gdprCountries.includes(fallbackCountry) || false,
                        timestamp: Date.now()
                    };
                }
            }

            function drawTutorialPreview() {
                const previewCanvas = document.getElementById('previewCanvas');
                if (!previewCanvas) return;
                
                const ctx = previewCanvas.getContext('2d');
                
                // Fundo
                ctx.fillStyle = '#0f142a';
                ctx.fillRect(0, 0, 400, 400);
                
                // Estrelas de fundo
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                for (let i = 0; i < 30; i++) {
                    ctx.beginPath();
                    ctx.arc(20 + i * 13, 30 + i * 12, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Desenhar estrelas (3 estrelas)
                for (let i = 0; i < 3; i++) {
                    const x = 100 + i * 100;
                    const y = 150 + (i % 2 === 0 ? 0 : 50);
                    
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 15;
                    
                    ctx.save();
                    ctx.translate(x, y);
                    
                    ctx.beginPath();
                    for (let j = 0; j < 5; j++) {
                        const angle = (j * 72 - 90) * Math.PI / 180;
                        const x1 = Math.cos(angle) * 12;
                        const y1 = Math.sin(angle) * 12;
                        const x2 = Math.cos(angle + 36 * Math.PI / 180) * 5;
                        const y2 = Math.sin(angle + 36 * Math.PI / 180) * 5;
                        
                        if (j === 0) ctx.moveTo(x1, y1);
                        else ctx.lineTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                    ctx.closePath();
                    
                    ctx.fillStyle = '#ffd700';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.restore();
                }
                
                // Desenhar obstáculo (1 vermelho)
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                
                ctx.beginPath();
                ctx.arc(300, 250, 12, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Desenhar jogador
                ctx.shadowColor = '#4a90e2';
                ctx.shadowBlur = 20;
                
                ctx.beginPath();
                ctx.arc(200, 280, 15, 0, Math.PI * 2);
                
                const gradient = ctx.createRadialGradient(195, 275, 5, 200, 280, 20);
                gradient.addColorStop(0, '#4a90e2');
                gradient.addColorStop(1, '#9b59b6');
                
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Olhos
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(195, 275, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(205, 275, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(194, 274, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(204, 274, 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Seta indicando movimento
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(230, 280);
                ctx.lineTo(250, 280);
                ctx.lineTo(245, 275);
                ctx.moveTo(250, 280);
                ctx.lineTo(245, 285);
                ctx.stroke();
            }

            // ==================== SISTEMA ANTI-BOT COM COOLDOWN ====================
            const AD_COOLDOWN = {
                rewarded: {
                    lastTime: 0,
                    minInterval: 45000,
                    maxPerHour: 8,
                    countThisHour: 0,
                    hourReset: Date.now()
                },
                interstitial: {
                    lastTime: 0,
                    minInterval: 60000,
                    maxPerSession: 3,
                    sessionCount: 0
                },
                button: {
                    lastClick: 0,
                    minInterval: 5000
                }
            };

            let adActivityLog = JSON.parse(localStorage.getItem('ad_activity_log')) || [];
            let clickHistory = [];

            // Detectar comportamento de bot
            document.addEventListener('click', (e) => {
                const now = Date.now();
                clickHistory.push(now);
                if (clickHistory.length > 10) clickHistory.shift();
                
                if (clickHistory.length >= 5) {
                    const timeSpan = now - clickHistory[0];
                    if (timeSpan < 2000) {
                        console.warn('🚨 Comportamento suspeito detectado');
                    }
                }
            });

            function checkAdCooldown(type) {
                const now = Date.now();
                const config = AD_COOLDOWN[type];
                
                if (!config) return false;
                
                if (type === 'rewarded') {
                    if (now - config.hourReset > 3600000) {
                        config.countThisHour = 0;
                        config.hourReset = now;
                    }
                }
                
                if (now - config.lastTime < config.minInterval) {
                    const secondsLeft = Math.ceil((config.minInterval - (now - config.lastTime)) / 1000);
                    showMessage(`⏳ Aguarde ${secondsLeft}s para outro anúncio`);
                    return false;
                }
                
                if (type === 'rewarded' && config.countThisHour >= config.maxPerHour) {
                    showMessage('⚠️ Limite de bônus por hora atingido');
                    return false;
                }
                
                if (type === 'interstitial' && config.sessionCount >= config.maxPerSession) {
                    return false;
                }
                
                return true;
            }

            function registerAdEvent(type, reward = null, success = true) {
                const now = Date.now();
                const config = AD_COOLDOWN[type];
                
                if (success) {
                    config.lastTime = now;
                    
                    if (type === 'rewarded') {
                        config.countThisHour++;
                        gameState.totalRewardsWatched = (gameState.totalRewardsWatched || 0) + 1;
                        localStorage.setItem('total_rewards', gameState.totalRewardsWatched);
                    } else if (type === 'interstitial') {
                        config.sessionCount++;
                    }
                }
                
                adActivityLog.push({
                    type: type,
                    reward: reward,
                    success: success,
                    timestamp: now,
                    formattedTime: new Date().toLocaleString(),
                    sessionId: gameState.sessionId || 'unknown',
                    playerName: gameState.playerName
                });
                
                if (adActivityLog.length > 100) adActivityLog.shift();
                localStorage.setItem('ad_activity_log', JSON.stringify(adActivityLog));
            }

            function safeButtonClick(buttonId, callback) {
                const now = Date.now();
                
                if (now - AD_COOLDOWN.button.lastClick < AD_COOLDOWN.button.minInterval) {
                    showMessage('🐢 Calma! Não clique tão rápido');
                    return;
                }
                
                AD_COOLDOWN.button.lastClick = now;
                callback();
            }

            // ==================== FUNÇÕES DE RECOMPENSA ====================
            function getRewardDescription(type) {
                const desc = {
                    'continue': 'CONTINUAR JOGANDO',
                    'doublePoints': 'DOBRAR PONTUAÇÃO ATUAL',
                    'extraLife': 'UMA VIDA EXTRA',
                    'speedBoost': 'DESACELERAR OBSTÁCULOS POR 10s'
                };
                return desc[type] || 'BÔNUS ESPECIAL';
            }

            function getRewardName(type) {
                const name = {
                    'continue': 'CONTINUAR',
                    'doublePoints': 'DOBRO',
                    'extraLife': 'VIDA',
                    'speedBoost': 'FOCO'
                };
                return name[type] || 'BÔNUS';
            }

            let activeBoosts = {
                doublePoints: false,
                speedBoost: false,
                extraLife: false
            };

            function giveReward(type) {
                switch(type) {
                    case 'continue':
                        gameState.gameActive = true;
                        gameState.player.x = canvas.width / 2;
                        gameState.player.y = canvas.height / 2;
                        gameState.obstacles = [];
                        showMessage('✨ Continue jogando!');
                        break;
                        
                    case 'doublePoints':
                        activeBoosts.doublePoints = true;
                        gameState.score *= 2;
                        if (gameState.score > gameState.record) {
                            gameState.record = gameState.score;
                            addToRanking();
                        }
                        showMessage('🎯 PONTOS EM DOBRO!');
                        break;
                        
                    case 'extraLife':
                        activeBoosts.extraLife = true;
                        showMessage('❤️ Vida extra ativada!');
                        break;
                        
                    case 'speedBoost':
                        activeBoosts.speedBoost = true;
                        const originalSpeed = gameState.baseSpeed;
                        gameState.baseSpeed = 0.3;
                        setTimeout(() => {
                            gameState.baseSpeed = originalSpeed;
                            activeBoosts.speedBoost = false;
                        }, 10000);
                        showMessage('🐢 Obstáculos mais lentos!');
                        break;
                }
            }

            // ==================== SISTEMA DE ESTRELAS CONTROLADO ====================
            const STAR_CONFIG = {
                minStars: 5,
                maxStars: 12,
                baseStars: 5,
                spawnRate: 0.3,
                collectionRadius: 10,
                pointsPerStar: 10
            };

            function createStar() {
                return {
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: Math.random() * (canvas.height - 40) + 20,
                    radius: STAR_CONFIG.collectionRadius,
                    collected: false,
                    pulsePhase: Math.random() * Math.PI * 2
                };
            }

            function manageStars() {
                gameState.stars = gameState.stars.filter(star => !star.collected);
                
                let targetStars = STAR_CONFIG.baseStars + Math.floor(gameState.score / 200);
                targetStars = Math.min(STAR_CONFIG.maxStars, targetStars);
                targetStars = Math.max(STAR_CONFIG.minStars, targetStars);
                
                while (gameState.stars.length < targetStars) {
                    if (Math.random() < STAR_CONFIG.spawnRate) {
                        gameState.stars.push(createStar());
                    } else {
                        break;
                    }
                }
                
                while (gameState.stars.length < STAR_CONFIG.minStars) {
                    gameState.stars.push(createStar());
                }
            }

            // ==================== SISTEMA DE ANÚNCIOS ====================
            async function showRewardedAd(rewardType) {
                if (!checkAdCooldown('rewarded')) return false;
                
                const consent = JSON.parse(localStorage.getItem(CONSENT_KEY) || '{}');
                if (!consent.choices || !consent.choices.marketing) {
                    showMessage('⚠️ Você precisa aceitar cookies para ver anúncios');
                    return false;
                }
                
                const wasActive = gameState.gameActive;
                if (wasActive) {
                    gameState.gameActive = false;
                    if (musicSystem.isPlaying) stopAdaptiveMusic();
                }
                
                registerAdEvent('rewarded', rewardType, false);
                
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content" style="text-align:center;">
                        <div style="font-size:3em; margin-bottom:10px;">🎬</div>
                        <h2 style="color:#ffd700;">ASSISTIR VÍDEO?</h2>
                        <p style="margin:20px 0; font-size:1.2em;">Ganhe: <strong>${getRewardDescription(rewardType)}</strong></p>
                        <p style="color:#888; margin-bottom:20px;">O vídeo tem ~5 segundos</p>
                        <div style="display:flex; gap:10px;">
                            <button class="consent-btn" id="cancelAd" style="flex:1;">❌ Não</button>
                            <button class="consent-btn accept" id="watchAd" style="flex:1;">✅ Assistir</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                return new Promise((resolve) => {
                    document.getElementById('watchAd').onclick = () => {
                        modal.remove();
                        
                        showMessage('🎥 Carregando anúncio...');
                        
                        const progressBar = document.createElement('div');
                        progressBar.className = 'progress-bar';
                        const progressFill = document.createElement('div');
                        progressFill.className = 'progress-fill';
                        progressBar.appendChild(progressFill);
                        document.body.appendChild(progressBar);
                        
                        let seconds = 0;
                        const adInterval = setInterval(() => {
                            seconds++;
                            progressFill.style.width = `${(seconds/5)*100}%`;
                            
                            if (seconds >= 5) {
                                clearInterval(adInterval);
                                progressBar.remove();
                                
                                registerAdEvent('rewarded', rewardType, true);
                                giveReward(rewardType);
                                showBonusAnimation(`+${getRewardName(rewardType)}!`);
                                
                                if (wasActive) {
                                    gameState.gameActive = true;
                                    if (musicSystem.isPlaying) initAdaptiveMusic();
                                }
                                
                                showMessage(`🎁 Recompensa: ${getRewardName(rewardType)}!`);
                                resolve(true);
                            }
                        }, 1000);
                    };
                    
                    document.getElementById('cancelAd').onclick = () => {
                        modal.remove();
                        
                        if (wasActive) {
                            gameState.gameActive = true;
                            if (musicSystem.isPlaying) initAdaptiveMusic();
                        }
                        
                        resolve(false);
                    };
                });
            }

            function showInterstitialAd(placement) {
                if (!checkAdCooldown('interstitial')) return false;
                
                const consent = JSON.parse(localStorage.getItem(CONSENT_KEY) || '{}');

            // ==================== ÁUDIO ====================
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();

            function createCollectSound() {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            }

            function createComboBreakSound() {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }

            function createAchievementSound() {
                const oscillator1 = audioCtx.createOscillator();
                const oscillator2 = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator1.type = 'triangle';
                oscillator2.type = 'triangle';
                oscillator1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                oscillator2.frequency.setValueAtTime(659.25, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                oscillator1.connect(gainNode);
                oscillator2.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator1.start();
                oscillator2.start();
                oscillator1.stop(audioCtx.currentTime + 0.4);
                oscillator2.stop(audioCtx.currentTime + 0.4);
            }

            // ==================== MÚSICA ADAPTATIVA ====================
            let musicSystem = {

            function initAdaptiveMusic() {
                if (musicSystem.context || !gameState.gameActive) return;
                
                musicSystem.context = new (window.AudioContext || window.webkitAudioContext)();
                const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00];
                
                const padOsc = musicSystem.context.createOscillator();
                const padGain = musicSystem.context.createGain();
                padOsc.type = 'sine';
                padOsc.frequency.value = 220;
                padGain.gain.value = 0.02;
                padOsc.connect(padGain);
                padGain.connect(musicSystem.context.destination);
                
                musicSystem.layers.pad = padOsc;
                musicSystem.gains.pad = padGain;
                
                const melodyOsc = musicSystem.context.createOscillator();
                const melodyGain = musicSystem.context.createGain();
                melodyOsc.type = 'triangle';
                melodyGain.gain.value = 0.01;
                melodyOsc.connect(melodyGain);
                melodyGain.connect(musicSystem.context.destination);
                
                musicSystem.layers.melody = melodyOsc;
                musicSystem.gains.melody = melodyGain;
                
                const bassOsc = musicSystem.context.createOscillator();
                const bassGain = musicSystem.context.createGain();
                bassOsc.type = 'sine';
                bassOsc.frequency.value = 110;
                bassGain.gain.value = 0.01;
                bassOsc.connect(bassGain);
                bassGain.connect(musicSystem.context.destination);
                
                musicSystem.layers.bass = bassOsc;
                musicSystem.gains.bass = bassGain;
                
                const now = musicSystem.context.currentTime;
                padOsc.start(now);
                melodyOsc.start(now);
                bassOsc.start(now);
                
                startMelodyLoop(pentatonic);
                musicSystem.isPlaying = true;
                document.getElementById('musicBtn').textContent = '🔊 Música';
            }

            function startMelodyLoop(scale) {
                if (musicSystem.loopInterval) clearInterval(musicSystem.loopInterval);
                
                let noteIndex = 0;
                
                musicSystem.loopInterval = setInterval(() => {
                    if (!musicSystem.isPlaying || !gameState.gameActive) return;
                    
                    const now = musicSystem.context.currentTime;
                    
                    if (gameState.combo >= 2) {
                        let melodyNote = scale[noteIndex % scale.length];
                        if (gameState.combo >= 5) melodyNote *= 2;
                        
                        let melodyVolume = 0.01 + (gameState.combo * 0.002);
                        musicSystem.layers.melody.frequency.setValueAtTime(melodyNote, now);
                        musicSystem.gains.melody.gain.setValueAtTime(melodyVolume, now);
                        musicSystem.gains.melody.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        
                        noteIndex++;
                    }
                    
                }, musicSystem.currentSpeed);
            }

            function updateMusicSpeed() {
                let newSpeed = Math.max(300, 800 - (gameState.combo * 40));
                if (newSpeed !== musicSystem.currentSpeed && musicSystem.isPlaying) {
                    musicSystem.currentSpeed = newSpeed;
                    if (musicSystem.loopInterval) {
                        clearInterval(musicSystem.loopInterval);
                        startMelodyLoop([261.63, 293.66, 329.63, 392.00, 440.00]);
                    }
                }
            }

            function stopAdaptiveMusic() {
                if (musicSystem.loopInterval) {
                    clearInterval(musicSystem.loopInterval);
                    musicSystem.loopInterval = null;
                }
                
                if (musicSystem.context) {
                    try {
                        musicSystem.context.close();
                    } catch (e) {}
                }
                
                musicSystem.isPlaying = false;
                musicSystem.context = null;
                document.getElementById('musicBtn').textContent = '🎵 Música';
            }

            function createObstacle() {

                if (gameState.stars.length > 0 && Math.random() < baseChance) {
                    return {
                        x: Math.random() * (canvas.width - 30) + 15,
                        y: Math.random() * (canvas.height - 30) + 15,
                        radius: 12,
                        speedX: (Math.random() - 0.5) * gameState.baseSpeed * (1 + gameState.score / 200),
                        speedY: (Math.random() - 0.5) * gameState.baseSpeed * (1 + gameState.score / 200),
                        visible: true,
                        blinkTimer: null
                    };
                }
                return null;
            }

            function startObstacleBlinking() {
                if (obstacleTimer) clearInterval(obstacleTimer);
                
                obstacleTimer = setInterval(() => {
                    if (!gameState.gameActive || gameState.obstacles.length === 0) return;
                    
                    gameState.obstacles.forEach(obs => {
                        if (Math.random() < 0.3) {
                            obs.visible = !obs.visible;
                            
                            if (!obs.visible) {
                                if (obs.blinkTimer) clearTimeout(obs.blinkTimer);
                                obs.blinkTimer = setTimeout(() => {
                                    if (obs) obs.visible = true;
                                }, 1000 + Math.random() * 2000);
                            }
                        }
                    });
                }, 2000);
            }

                gameState.stars.forEach(star => {
                    if (!star.collected) {
                        const dx = gameState.player.x - star.x;
                        const dy = gameState.player.y - star.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < gameState.player.radius + star.radius) {
                            star.collected = true;
                            
                            let points = STAR_CONFIG.pointsPerStar * gameState.combo;
                            if (activeBoosts.doublePoints) points *= 2;
                            
                            gameState.score += points;
                            gameState.totalStars++;
                            gameState.starsCollected++;
                            
                            if (gameState.comboTimeout) clearTimeout(gameState.comboTimeout);
                            gameState.combo++;
                            updateCombo();
                            
                            gameState.comboTimeout = setTimeout(() => resetCombo(), 3000);
                            
                            if (gameState.score > gameState.record) {
                                gameState.record = gameState.score;
                                localStorage.setItem('record', gameState.record);
                                showBonusAnimation('🏆 NOVO RECORDE!');
                                addToRanking();
                            }
                            
                            manageStars();
                            
                            createCollectSound();
                            
                            updateDailyChallenges('stars', 1);
                            
                            localStorage.setItem('totalStars', gameState.totalStars);
                            checkAchievements();
                            updateDisplay();
                        }
                    }
                });

                manageStars();

                while (gameState.obstacles.length < Math.min(MAX_OBSTACLES, Math.floor(gameState.score / 50) + 2)) {
                    const obs = createObstacle();
                    if (obs) gameState.obstacles.push(obs);
                }

                gameState.obstacles.forEach(obs => {
                    if (!obs.visible) return;
                    
                    const dx = gameState.player.x - obs.x;
                    const dy = gameState.player.y - obs.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < gameState.player.radius + obs.radius && gameState.gameActive) {
                        if (activeBoosts.extraLife) {
                            activeBoosts.extraLife = false;
                            showMessage('❤️ Vida extra consumida!');
                            gameState.player.x = Math.random() * (canvas.width - 40) + 20;
                            gameState.player.y = Math.random() * (canvas.height - 40) + 20;
                        } else {
                            gameState.gameActive = false;
                            createComboBreakSound();
                            stopAdaptiveMusic();
                            
                            if (obstacleTimer) {
                                clearInterval(obstacleTimer);
                                obstacleTimer = null;
                            }
                            
                            if (checkAdCooldown('rewarded')) {
                                const continueBtn = document.createElement('div');
                                continueBtn.style.cssText = `
                                    position: fixed;
                                    bottom: 120px;
                                    left: 50%;
                                    transform: translateX(-50%);
                                    background: linear-gradient(45deg, #ffd700, #ffa500);
                                    color: #1a1f3a;
                                    padding: 15px 30px;
                                    border-radius: 50px;
                                    font-weight: bold;
                                    font-size: 1.2em;
                                    z-index: 1001;
                                    cursor: pointer;
                                    box-shadow: 0 5px 20px rgba(255,215,0,0.5);
                                    animation: pulse 1.5s infinite;
                                `;
                                continueBtn.innerHTML = '🎬 ASSISTIR VÍDEO PARA CONTINUAR 🎁';
                                continueBtn.onclick = () => {
                                    safeButtonClick('continueBtn', async () => {
                                        document.body.removeChild(continueBtn);
                                        const watched = await showRewardedAd('continue');
                                        if (!watched) {
                                            showInterstitialAd('game_over');
                                            showMessage(`💫 Game Over! Pontuação: ${gameState.score}`);
                                        }
                                    });
                                };
                                document.body.appendChild(continueBtn);
                                
                                setTimeout(() => {
                                    if (document.body.contains(continueBtn)) {
                                        document.body.removeChild(continueBtn);
                                        showInterstitialAd('game_over');
                                        showMessage(`💫 Game Over! Pontuação: ${gameState.score}`);
                                    }
                                }, 15000);
                            } else {
                                showInterstitialAd('game_over');
                                showMessage(`💫 Game Over! Pontuação: ${gameState.score}`);
                            }
                        }
                    }
                });
            }

            function updateObstacles() {
                gameState.obstacles.forEach(obs => {
                    obs.x += obs.speedX;
                    obs.y += obs.speedY;
                    
                    if (obs.x < obs.radius || obs.x > canvas.width - obs.radius) {
                        obs.speedX *= -1;
                    }
                    if (obs.y < obs.radius || obs.y > canvas.height - obs.radius) {
                        obs.speedY *= -1;
                    }
                });
            }

            function getShareText() {
                const frases = [
                    `✨ ${gameState.playerName} fez ${gameState.score} pontos no Starrush Infinito! Consegue superar? 🌟`,
                    `🔥 ${gameState.playerName} conseguiu combo x${gameState.maxCombo} no Starrush! 🎮`,
                    `🏆 ${gameState.playerName} bateu recorde: ${gameState.record} estrelas! Vem jogar 💫`,
                    `🌟 ${gameState.playerName} já coletei ${gameState.totalStars} estrelas no Starrush!`,
                    `⚡ ${gameState.playerName} conquistou ${playerAchievements.length} conquistas! E você?`
                ];
                return encodeURIComponent(frases[Math.floor(Math.random() * frases.length)]);
            }

            function getGameUrl() {
                return encodeURIComponent(window.location.href);
            }

            function handleShare(platform) {
                if (!gameState.bonusAvailable) {
                    showMessage('⏳ Aguarde 30s para outro bônus!');
                    return;
                }

                let shareUrl = '';
                const text = getShareText();
                const url = getGameUrl();

                switch(platform) {
                    case 'x':
                        shareUrl = `https://twitter.com/intent/tweet?text=${text}&url=${url}`;
                        break;
                    case 'facebook':
                        shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`;
                        break;
                    case 'whatsapp':
                        shareUrl = `https://api.whatsapp.com/send?text=${text}%20${url}`;
                        break;
                }

                if (shareUrl) {
                    window.open(shareUrl, '_blank', 'width=600,height=400');
                    
                    let bonus = 25 * gameState.combo;
                    gameState.score += bonus;
                    gameState.totalShares++;
                    gameState.bonusAvailable = false;
                    
                    updateDailyChallenges('share', 1);
                    
                    createAchievementSound();
                    showBonusAnimation(`+${bonus} COMPARTILHOU!`);
                    showMessage(`🎁 Bônus de ${bonus} pontos!`);
                    
                    localStorage.setItem('totalShares', gameState.totalShares);
                    checkAchievements();
                    updateDisplay();
                    
                    setTimeout(() => {
                        gameState.bonusAvailable = true;
                        showMessage('✨ Novo bônus disponível!');
                    }, 30000);
                }
            }

            let mouseDown = false;

            function handleStart(e) {
                e.preventDefault();
                mouseDown = true;
                if (!gameState.gameActive) return;
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                updatePlayerPosition(e);
            }

            function handleMove(e) {
                e.preventDefault();
                if (!mouseDown || !gameState.gameActive) return;
                updatePlayerPosition(e);
            }

            function handleEnd(e) {
                e.preventDefault();
                mouseDown = false;
            }

            function updatePlayerPosition(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                let clientX, clientY;
                
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                let x = (clientX - rect.left) * scaleX;
                let y = (clientY - rect.top) * scaleY;
                
                gameState.player.x = Math.max(gameState.player.radius, Math.min(canvas.width - gameState.player.radius, x));
                gameState.player.y = Math.max(gameState.player.radius, Math.min(canvas.height - gameState.player.radius, y));
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                for (let i = 0; i < 50; i++) {
                    ctx.beginPath();
                    ctx.arc((i * 37) % canvas.width, (i * 23) % canvas.height, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                gameState.obstacles.forEach(obs => {
                    if (!obs.visible) return;
                    
                    ctx.beginPath();
                    ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
                
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 20;
                const currentSkin = skins[gameState.currentSkin];
                
                gameState.stars.forEach(star => {
                    const scale = 1 + Math.sin(Date.now() * 0.005 + star.pulsePhase) * 0.1;
                    
                    ctx.save();
                    ctx.translate(star.x, star.y);
                    ctx.scale(scale, scale);
                    
                    if (currentSkin.stars === 'multicolor') {
                        ctx.fillStyle = `hsl(${Date.now() * 0.1 % 360}, 100%, 50%)`;
                    } else {
                        ctx.fillStyle = currentSkin.stars;
                    }
                    
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 72 - 90) * Math.PI / 180;
                        const x1 = Math.cos(angle) * star.radius;
                        const y1 = Math.sin(angle) * star.radius;
                        const x2 = Math.cos(angle + 36 * Math.PI / 180) * (star.radius * 0.4);
                        const y2 = Math.sin(angle + 36 * Math.PI / 180) * (star.radius * 0.4);
                        
                        if (i === 0) ctx.moveTo(x1, y1);
                        else ctx.lineTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                    ctx.closePath();
                    
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.restore();
                });
                
                ctx.shadowColor = '#4a90e2';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(gameState.player.x, gameState.player.y, gameState.player.radius, 0, Math.PI * 2);
                
                if (currentSkin.player === 'linear-gradient') {
                    const gradient = ctx.createRadialGradient(
                        gameState.player.x - 5, gameState.player.y - 5, 5,
                        gameState.player.x, gameState.player.y, gameState.player.radius + 5
                    );
                    currentSkin.playerGradient.forEach((color, i) => {
                        gradient.addColorStop(i / (currentSkin.playerGradient.length - 1), color);
                    });
                    ctx.fillStyle = gradient;
                } else {
                    const gradient = ctx.createRadialGradient(
                        gameState.player.x - 5, gameState.player.y - 5, 5,
                        gameState.player.x, gameState.player.y, gameState.player.radius + 5
                    );
                    gradient.addColorStop(0, currentSkin.playerGradient[0]);
                    gradient.addColorStop(1, currentSkin.playerGradient[1]);
                    ctx.fillStyle = gradient;
                }
                
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(gameState.player.x - 5, gameState.player.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(gameState.player.x + 5, gameState.player.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(gameState.player.x - 6, gameState.player.y - 6, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(gameState.player.x + 4, gameState.player.y - 6, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                
                if (!gameState.gameActive) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('💫 GAME OVER', canvas.width/2, canvas.height/2);
                    ctx.font = '16px Arial';
                    ctx.fillText(`Pontuação: ${gameState.score}`, canvas.width/2, canvas.height/2 + 40);
                }
            }

            function gameLoop() {
                if (gameState.gameActive) {
                    updateObstacles();
                    checkCollisions();
                    updateMusicSpeed();
                }
                draw();
                requestAnimationFrame(gameLoop);
            }

            function initGameAfterConsent() {
                const consent = localStorage.getItem(CONSENT_KEY);
                if (consent) {
                    const data = JSON.parse(consent);
                    if (data.choices.essential) {
                        gameState.record = parseInt(localStorage.getItem('record')) || 0;
                        gameState.totalStars = parseInt(localStorage.getItem('totalStars')) || 0;
                        gameState.totalShares = parseInt(localStorage.getItem('totalShares')) || 0;
                        gameState.totalRewardsWatched = parseInt(localStorage.getItem('total_rewards')) || 0;
                        playerAchievements = JSON.parse(localStorage.getItem('achievements')) || [];
                        ranking = JSON.parse(localStorage.getItem('ranking')) || [];
                    }
                }
                
                initGame();
                gameLoop();
                
                canvas.addEventListener('mousedown', handleStart);
                canvas.addEventListener('mousemove', handleMove);
                canvas.addEventListener('mouseup', handleEnd);
                canvas.addEventListener('mouseleave', handleEnd);
                
                canvas.addEventListener('touchstart', handleStart, { passive: false });
                canvas.addEventListener('touchmove', handleMove, { passive: false });
                canvas.addEventListener('touchend', handleEnd);
                canvas.addEventListener('touchcancel', handleEnd);

                newGameBtn.addEventListener('click', () => {
                    safeButtonClick('newGameBtn', () => {
                        if (checkAdCooldown('interstitial')) {
                            showInterstitialAd('new_game');
                        }
                        gameState.gameActive = true;
                        initGame();
                        showMessage('🌟 Nova jornada infinita!');
                    });
                });

                shareXBtn.addEventListener('click', () => handleShare('x'));
                shareFacebookBtn.addEventListener('click', () => handleShare('facebook'));
                shareWhatsAppBtn.addEventListener('click', () => handleShare('whatsapp'));

                musicBtn.addEventListener('click', toggleMusic);
                
                bonusBtn.addEventListener('click', () => {
                    safeButtonClick('bonusBtn', showBonusMenu);
                });

                document.body.addEventListener('click', function initAudio() {
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                }, { once: true });
            }

            window.__cmpLoaded = false;
            
            if (typeof cookieScript !== 'undefined') {
                window.__cmpLoaded = true;
            }
            
            (async function init() {
                if (!checkConsent() && !window.__cmpLoaded) {
                    await showConsentPopup();
                } else if (!checkConsent()) {
                    setTimeout(() => {
                        if (!checkConsent()) {
                            showTutorial();
                        }
                    }, 2000);
                } else {
                    showTutorial();
                }
            })();
        })();
    </script>
</body>
</html>
