<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Double or Burst ⚡ 6 ou 7</title>
    <!-- Google H5 Games Ad Script (necessário para monetização) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    <!-- Nota: Substitua "ca-pub-XXXXXXXXXXXXXXXX" pelo seu ID do AdSense -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2f3f 0%, #0e1a26 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            padding: 20px 16px 30px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), 0 0 0 2px #ffd96633 inset;
            border: 1px solid #f1c40f40;
        }
        /* placar e status */
        .score-panel {
            background: #0b1219;
            border-radius: 100px;
            padding: 18px 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 0 #00000055, 0 10px 20px #00000060;
            border: 1px solid #f39c1255;
        }
        .total-box {
            background: #1e2b3a;
            border-radius: 40px;
            padding: 8px 20px;
            color: #f1c40f;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-shadow: 0 3px 0 #9e6d0b;
            box-shadow: inset 0 -3px 0 #0a0f14;
        }
        .current-streak {
            background: #2c3e50;
            border-radius: 30px;
            padding: 8px 18px;
            color: white;
            font-weight: 600;
            font-size: 1.3rem;
            border: 2px solid #f39c12;
        }
        /* número principal */
        .number-hero {
            background: #121f2b;
            border-radius: 90px;
            margin: 10px 0 25px;
            padding: 40px 20px;
            text-align: center;
            border: 3px solid #f1c40f;
            box-shadow: 0 15px 0 #0f1a22, 0 20px 30px black;
        }
        .big-number {
            font-size: 14rem;
            font-weight: 900;
            line-height: 1;
            color: #f1c40f;
            text-shadow: 0 10px 0 #b57c0e, 0 15px 25px #f39c12;
            letter-spacing: -10px;
        }
        @media (max-width: 450px) {
            .big-number { font-size: 11rem; }
        }
        /* ações: dois botões enormes */
        .actions {
            display: flex;
            gap: 15px;
            margin: 15px 0 20px;
        }
        .action-btn {
            flex: 1;
            border: none;
            background: #1e2f3c;
            border-radius: 60px;
            padding: 28px 0;
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 9px 0 #0c141c, 0 5px 20px black;
            transition: all 0.07s ease;
            border: 2px solid #ffffff22;
            letter-spacing: 2px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 3px 0 #0c141c;
        }
        .cashout {
            background: #27ae60;
            text-shadow: 0 3px 0 #1e7e46;
        }
        .risk {
            background: #e67e22;
            text-shadow: 0 3px 0 #b45f15;
        }
        .action-btn:disabled {
            opacity: 0.6;
            transform: translateY(4px);
            box-shadow: 0 5px 0 #0c141c;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        /* área de anúncios (recompensados) */
        .ad-reward-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0 10px;
        }
        .reward-btn {
            background: #fbb720;
            border: none;
            border-radius: 50px;
            padding: 16px 18px;
            font-size: 1.3rem;
            font-weight: 800;
            color: #1a2a33;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 7px 0 #b57c0e;
            transition: all 0.08s;
            border: 2px solid #ffe484;
            cursor: pointer;
            touch-action: manipulation;
        }
        .reward-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b57c0e;
        }
        .reward-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            pointer-events: none;
        }
        .ad-icon {
            font-size: 2rem;
            filter: drop-shadow(2px 4px 0 #9e6d0b);
        }
        /* mensagens e game over */
        .status-message {
            text-align: center;
            color: #ffe08c;
            font-weight: 600;
            font-size: 1.2rem;
            min-height: 2rem;
            text-shadow: 0 2px 0 #5a3f0b;
            margin: 10px 0 5px;
        }
        .footer-note {
            color: #5f7a92;
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        /* simulação de anúncio H5 games (placeholder visual) */
        .ad-container {
            background: #2d4055;
            border-radius: 40px;
            padding: 8px 15px;
            color: #aac3d4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px dashed #f1c40f;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Placar -->
        <div class="score-panel">
            <div class="total-box" id="totalSaldo">0</div>
            <div class="current-streak" id="pontosSequencia">1</div>
        </div>

        <!-- Número principal (6 ou 7) -->
        <div class="number-hero">
            <div class="big-number" id="currentNumber">6</div>
        </div>

        <!-- Botões de ação: coletar vs arriscar -->
        <div class="actions">
            <button class="action-btn cashout" id="btnCashout" aria-label="Coletar">💰 COBRAR</button>
            <button class="action-btn risk" id="btnRisk" aria-label="Arriscar">⚡ PRÓXIMO</button>
        </div>

        <!-- Mensagem de status / Game Over -->
        <div class="status-message" id="statusMsg">👉 arrisque com cuidado!</div>

        <!-- ÁREA DE MONETIZAÇÃO: anúncios em vídeo (H5 Game Google) -->
        <div class="ad-reward-area">
            <!-- Botão 1: Continuar após estourar (Revive) -->
            <button class="reward-btn" id="reviveAdBtn" disabled>
                <span class="ad-icon">🎬</span> ASSISTIR VÍDEO E CONTINUAR
            </button>
            <!-- Botão 2: Bônus diário / começar com pontos -->
            <button class="reward-btn" id="dailyBoostBtn">
                <span class="ad-icon">⭐</span> VÍDEO BÔNUS (COMEÇAR COM 5)
            </button>
            <!-- Botão 3: Dobrar último prêmio coletado -->
            <button class="reward-btn" id="doubleCollectBtn" disabled>
                <span class="ad-icon">2️⃣</span> DOBRAR ÚLTIMA COLETA
            </button>
        </div>

        <!-- Selo H5 Games (placeholder apenas para estética) -->
        <div class="ad-container">
            <span>🎮 H5 Games · Anúncios Google</span>
        </div>
        <div class="footer-note">toque com estratégia · 6 ou 7</div>
    </div>

    <script>
        (function() {
            // ---------- ESTADO DO JOGO ----------
            let saldoTotal = 0;                 // moedas permanentes
            let pontosAtuais = 1;                // pontuação da sequência (começa com 1)
            let ultimoNumero = Math.random() < 0.5 ? 6 : 7;   // 6 ou 7 aleatório
            let gameOver = false;                 // estourou a sequência?
            let ultimaColeta = 0;                  // guarda o valor da última vez que coletou (para o botão dobrar)
            let ultimaSequenciaPerdida = 0;        // guarda quantos pontos foram perdidos no estouro

            // Elementos DOM
            const elTotal = document.getElementById('totalSaldo');
            const elPontos = document.getElementById('pontosSequencia');
            const elNumber = document.getElementById('currentNumber');
            const btnCash = document.getElementById('btnCashout');
            const btnRisk = document.getElementById('btnRisk');
            const statusMsg = document.getElementById('statusMsg');

            // Botões de anúncio
            const reviveBtn = document.getElementById('reviveAdBtn');
            const dailyBtn = document.getElementById('dailyBoostBtn');
            const doubleBtn = document.getElementById('doubleCollectBtn');

            // Atualiza toda a interface com base no estado atual
            function atualizarUI() {
                elTotal.textContent = saldoTotal;
                elPontos.textContent = pontosAtuais;
                elNumber.textContent = ultimoNumero;

                // Se gameOver (estourou), desabilita os botões de ação e exibe mensagem
                if (gameOver) {
                    btnCash.disabled = true;
                    btnRisk.disabled = true;
                    statusMsg.innerText = '💥 E S T O R O U !  use o vídeo para reviver';
                    // Habilita botão revive (só funciona se gameOver)
                    reviveBtn.disabled = false;
                } else {
                    btnCash.disabled = false;
                    btnRisk.disabled = false;
                    statusMsg.innerText = pontosAtuais > 1 ? `🔥 sequência de ${pontosAtuais}` : '👉 arrisque com cuidado!';
                    reviveBtn.disabled = true;     // só revive quando perdeu
                }

                // Botão de dobrar: só habilita se houver uma coleta anterior (ultimaColeta > 0) e não estiver em gameOver
                if (ultimaColeta > 0 && !gameOver) {
                    doubleBtn.disabled = false;
                } else {
                    doubleBtn.disabled = true;
                }

                // Botão daily está sempre habilitado
            }

            // Gera novo número (6 ou 7)
            function novoNumeroAleatorio() {
                return Math.random() < 0.5 ? 6 : 7;
            }

            // Lógica de arriscar (próximo)
            function acaoArriscar() {
                if (gameOver) return;

                const anterior = ultimoNumero;
                const proximo = novoNumeroAleatorio();

                if (proximo === anterior) {
                    // ACERTO: dobra pontos
                    pontosAtuais *= 2;
                    statusMsg.innerText = '✅ IGUAL! pontos dobraram!';
                } else {
                    // ERRO: estoura a sequência (game over)
                    ultimaSequenciaPerdida = pontosAtuais; // guarda o valor perdido
                    gameOver = true;
                    pontosAtuais = 0;   // zera visualmente
                    statusMsg.innerText = '💥 DIFERENTE! você perdeu a sequência';
                }
                // Atualiza número atual
                ultimoNumero = proximo;
                atualizarUI();
            }

            // Lógica de coletar (cash out)
            function acaoColetar() {
                if (gameOver) return;
                if (pontosAtuais > 0) {
                    // acrescenta ao saldo
                    saldoTotal += pontosAtuais;
                    ultimaColeta = pontosAtuais;   // guarda para o botão dobrar
                    // Reseta sequência
                    pontosAtuais = 1;
                    ultimoNumero = novoNumeroAleatorio();
                    statusMsg.innerText = '💰 Coletado! nova rodada';
                }
                atualizarUI();
            }

            // ---------- FUNÇÕES DE ANÚNCIOS (SIMULAÇÃO H5 GAME GOOGLE) ----------
            function assistirVideoRecompensa(tipo) {
                // Simulação: janela de confirmação (no jogo real dispara o ad)
                return confirm(`🎬 H5 Game Ad (Google)\nClique OK para simular que assistiu ao vídeo e ganhar a recompensa de: ${tipo}`);
            }

            // 1. REVIVE: recupera a sequência perdida
            reviveBtn.addEventListener('click', () => {
                if (!gameOver) {
                    reviveBtn.disabled = true;
                    return;
                }
                
                if (assistirVideoRecompensa('CONTINUAR COM A SEQUÊNCIA PERDIDA')) {
                    // Revive: volta com os pontos que tinha antes de estourar
                    gameOver = false;
                    pontosAtuais = ultimaSequenciaPerdida > 0 ? ultimaSequenciaPerdida : 1;
                    // Garante que o número atual não seja o mesmo que causou o estouro? Melhor deixar aleatório
                    ultimoNumero = novoNumeroAleatorio();
                    statusMsg.innerText = '✨ Reviveu! continue sua sequência';
                } else {
                    alert('Anúncio não concluído. Você não reviveu.');
                }
                atualizarUI();
            });

            // 2. BÔNUS DIÁRIO: começar com 5 pontos (adiciona 4 pontos extras à sequência atual)
            dailyBtn.addEventListener('click', () => {
                if (gameOver) {
                    alert('Você estourou! Use o revive primeiro.');
                    return;
                }
                if (assistirVideoRecompensa('BÔNUS: +4 PONTOS NA SEQUÊNCIA')) {
                    // Soma 4 à sequência (começar com 5 significa +4, já que começa em 1)
                    pontosAtuais += 4;
                    statusMsg.innerText = '🎁 Bônus ativado! +4 pontos';
                } else {
                    alert('Anúncio não assistido. Tente novamente.');
                }
                atualizarUI();
            });

            // 3. DOBRAR ÚLTIMA COLETA
            doubleBtn.addEventListener('click', () => {
                if (ultimaColeta <= 0) {
                    alert('Nenhuma coleta recente para dobrar');
                    return;
                }
                if (gameOver) {
                    alert('Você estourou, resolva primeiro.');
                    return;
                }
                if (assistirVideoRecompensa('DOBRAR ÚLTIMO COLETADO')) {
                    saldoTotal += ultimaColeta;   // dobra o valor guardado
                    statusMsg.innerText = `2️⃣ +${ultimaColeta} pontos (dobrou)`;
                    ultimaColeta = 0; // limpa para não dobrar de novo
                } else {
                    alert('Anúncio não assistido.');
                }
                atualizarUI();
            });

            // Eventos dos botões principais - versão simplificada e funcional
            btnRisk.addEventListener('click', acaoArriscar);
            btnCash.addEventListener('click', acaoColetar);
            
            // Versão para touch - apenas para prevenir zoom, mas sem cancelar o evento
            btnRisk.addEventListener('touchstart', (e) => {
                e.preventDefault(); // só previne zoom, não o clique
            }, { passive: false });
            btnCash.addEventListener('touchstart', (e) => {
                e.preventDefault();
            }, { passive: false });

            // Inicializar jogo
            function iniciarJogo() {
                saldoTotal = 0;
                pontosAtuais = 1;
                ultimoNumero = novoNumeroAleatorio();
                gameOver = false;
                ultimaColeta = 0;
                ultimaSequenciaPerdida = 0;
                atualizarUI();
            }
            iniciarJogo();

        })();
    </script>

    <!-- Nota importante: Para anúncios reais, substitua "ca-pub-XXXXXXXXXXXXXXXX" no script do cabeçalho
         e implemente a lógica com adsbygoogle ou gamedistribution. O fluxo de confirmação atual é simulado.
         Este jogo é totalmente responsivo e segue a mecânica "double or burst" com monetização por vídeo. -->
</body>
</html>
