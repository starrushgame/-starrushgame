            padding: 0;
            box-sizing: border-box;

        body {
            background: linear-gradient(135deg, #0a0f2a, #1a1f3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            position: relative;
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 15px;
            position: relative;
            z-index: 1;
        }

        #livesSection {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        #livesLabel {
            color: #ffd700;
            font-size: 0.9em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #livesContainer {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }

        .star-life {
            font-size: 2.2em;
            transition: all 0.3s ease;
            position: relative;
        }

        .star-life.active {
            filter: drop-shadow(0 0 10px gold);
            animation: starPulse 2s infinite;
        }

        .star-life.lost {
            opacity: 0.3;
            filter: grayscale(0.8);
        }

        @keyframes starPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px gold); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px gold); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px gold); }
        }

        @keyframes cometEffect {
            0% { transform: translateX(-100%) rotate(0deg); opacity: 1; }
            100% { transform: translateX(200%) rotate(45deg); opacity: 0; }
        }

        @keyframes starRainEffect {
            0% { transform: translateY(-100%); opacity: 1; }
            100% { transform: translateY(200%); opacity: 0; }
        }

        .comet {
            position: fixed;
            top: 20%;
            left: -100px;
            font-size: 3em;
            animation: cometEffect 2s linear forwards;
            z-index: 2000;
            pointer-events: none;
        }

        .star-rain {
            position: fixed;
            top: -50px;
            left: 20%;
            font-size: 2em;
            animation: starRainEffect 3s linear forwards;
            z-index: 2000;
            pointer-events: none;

            function drawTutorialPreview() {
                const previewCanvas = document.getElementById('previewCanvas');
                if (!previewCanvas) return;
                
                const ctx = previewCanvas.getContext('2d');
                
                ctx.fillStyle = '#0f142a';
                ctx.fillRect(0, 0, 400, 400);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                for (let i = 0; i < 30; i++) {
                    ctx.beginPath();
                    ctx.arc(20 + i * 13, 30 + i * 12, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                for (let i = 0; i < 3; i++) {
                    const x = 100 + i * 100;
                    const y = 150 + (i % 2 === 0 ? 0 : 50);
                    
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 15;
                    
                    ctx.save();
                    ctx.translate(x, y);
                    
                    ctx.beginPath();
                    for (let j = 0; j < 5; j++) {
                        const angle = (j * 72 - 90) * Math.PI / 180;
                        const x1 = Math.cos(angle) * 12;
                        const y1 = Math.sin(angle) * 12;
                        const x2 = Math.cos(angle + 36 * Math.PI / 180) * 5;
                        const y2 = Math.sin(angle + 36 * Math.PI / 180) * 5;
                        
                        if (j === 0) ctx.moveTo(x1, y1);
                        else ctx.lineTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                    ctx.closePath();
                    
                    ctx.fillStyle = '#ffd700';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.restore();
                }
                
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                
                ctx.beginPath();
                ctx.arc(300, 250, 12, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.shadowColor = '#4a90e2';
                ctx.shadowBlur = 20;
                
                ctx.beginPath();
                ctx.arc(200, 280, 15, 0, Math.PI * 2);
                
                const gradient = ctx.createRadialGradient(195, 275, 5, 200, 280, 20);
                gradient.addColorStop(0, '#4a90e2');
                gradient.addColorStop(1, '#9b59b6');
                
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(195, 275, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(205, 275, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(194, 274, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(204, 274, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            function animateTutorialPreview() {
                const previewCanvas = document.getElementById('previewCanvas');
                if (!previewCanvas) return;
                
                const ctx = previewCanvas.getContext('2d');
                let frame = 0;
                
                function animate() {
                    drawTutorialPreview();
                    
                    const x = 150 + Math.sin(frame * 0.05) * 30;
                    const y = 200 + Math.cos(frame * 0.03) * 20;
                    
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 15;
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 72 - 90 + frame * 2) * Math.PI / 180;
                        const x1 = Math.cos(angle) * 8;
                        const y1 = Math.sin(angle) * 8;
                        const x2 = Math.cos(angle + 36 * Math.PI / 180) * 4;
                        const y2 = Math.sin(angle + 36 * Math.PI / 180) * 4;
                        
                        if (i === 0) ctx.moveTo(x + x1, y + y1);
                        else ctx.lineTo(x + x1, y + y1);
                        ctx.lineTo(x + x2, y + y2);
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    frame++;
                    requestAnimationFrame(animate);
                }
                
                requestAnimationFrame(animate);
            }

            function checkAdCooldown(type) {
                const now = Date.now();
                const config = AD_COOLDOWN[type];
                
                if (!config) return false;
                
                if (type === 'rewarded') {
                    if (now - config.hourReset > 3600000) {
                        config.countThisHour = 0;
                        config.hourReset = now;
                    }
                }
                
                if (now - config.lastTime < config.minInterval) {
                    const secondsLeft = Math.ceil((config.minInterval - (now - config.lastTime)) / 1000);
                    showMessage(`⏳ Aguarde ${secondsLeft}s para outro anúncio`);
                    return false;
                }
                
                if (type === 'rewarded' && config.countThisHour >= config.maxPerHour) {
                    showMessage('⚠️ Limite de bônus por hora atingido');
                    return false;
                }
                
                if (type === 'interstitial' && config.sessionCount >= config.maxPerSession) {
                    return false;
                }
                
                return true;
            }

                    sessionId: gameState.sessionId || 'unknown',

                gameState.stars = gameState.stars.filter(star => !star.collected);

                targetStars = Math.max(STAR_CONFIG.minStars, targetStars);

                    if (Math.random() < STAR_CONFIG.spawnRate) {
                        gameState.stars.push(createStar());
                    } else {
                        break;
                    }
                }
                
                while (gameState.stars.length < STAR_CONFIG.minStars) {
                    gameState.stars.push(createStar());
                }

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();

            function createCollectSound() {
                if (audioCtx.state !== 'running') return;
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            }

            function createComboBreakSound() {
                if (audioCtx.state !== 'running') return;
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            }

            function createAchievementSound() {
                if (audioCtx.state !== 'running') return;
                const oscillator1 = audioCtx.createOscillator();
                const oscillator2 = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator1.type = 'triangle';
                oscillator2.type = 'triangle';
                oscillator1.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                oscillator2.frequency.setValueAtTime(659.25, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                oscillator1.connect(gainNode);
                oscillator2.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator1.start();
                oscillator2.start();
                oscillator1.stop(audioCtx.currentTime + 0.4);
                oscillator2.stop(audioCtx.currentTime + 0.4);
            }

            let musicSystem = {
                context: null,
                layers: {},
                gains: {},
                isPlaying: false,
                loopInterval: null,
                currentSpeed: 800
            };

            function initAdaptiveMusic() {
                if (musicSystem.context || !gameState.gameActive) return;
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                musicSystem.context = new (window.AudioContext || window.webkitAudioContext)();
                const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00];
                
                const padOsc = musicSystem.context.createOscillator();
                const padGain = musicSystem.context.createGain();
                padOsc.type = 'sine';
                padOsc.frequency.value = 220;
                padGain.gain.value = 0.02;
                padOsc.connect(padGain);
                padGain.connect(musicSystem.context.destination);
                
                musicSystem.layers.pad = padOsc;
                musicSystem.gains.pad = padGain;
                
                const melodyOsc = musicSystem.context.createOscillator();
                const melodyGain = musicSystem.context.createGain();
                melodyOsc.type = 'triangle';
                melodyGain.gain.value = 0.01;
                melodyOsc.connect(melodyGain);
                melodyGain.connect(musicSystem.context.destination);
                
                musicSystem.layers.melody = melodyOsc;
                musicSystem.gains.melody = melodyGain;
                
                const bassOsc = musicSystem.context.createOscillator();
                const bassGain = musicSystem.context.createGain();
                bassOsc.type = 'sine';
                bassOsc.frequency.value = 110;
                bassGain.gain.value = 0.01;
                bassOsc.connect(bassGain);
                bassGain.connect(musicSystem.context.destination);
                
                musicSystem.layers.bass = bassOsc;
                musicSystem.gains.bass = bassGain;
                
                const now = musicSystem.context.currentTime;
                padOsc.start(now);
                melodyOsc.start(now);
                bassOsc.start(now);
                
                startMelodyLoop(pentatonic);
                musicSystem.isPlaying = true;
                document.getElementById('musicBtn').innerHTML = '🔊 Música';
            }

            function startMelodyLoop(scale) {
                if (musicSystem.loopInterval) clearInterval(musicSystem.loopInterval);
                
                let noteIndex = 0;
                
                musicSystem.loopInterval = setInterval(() => {
                    if (!musicSystem.isPlaying || !gameState.gameActive) return;
                    if (!musicSystem.context) return;
                    
                    const now = musicSystem.context.currentTime;
                    
                    if (gameState.combo >= 2) {
                        let melodyNote = scale[noteIndex % scale.length];
                        if (gameState.combo >= 5) melodyNote *= 2;
                        
                        let melodyVolume = 0.01 + (gameState.combo * 0.002);
                        musicSystem.layers.melody.frequency.setValueAtTime(melodyNote, now);
                        musicSystem.gains.melody.gain.setValueAtTime(melodyVolume, now);
                        musicSystem.gains.melody.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        
                        noteIndex++;
                    }
                    
                }, musicSystem.currentSpeed);
            }

            function updateMusicSpeed() {
                let newSpeed = Math.max(300, 800 - (gameState.combo * 40));
                if (newSpeed !== musicSystem.currentSpeed && musicSystem.isPlaying) {
                    musicSystem.currentSpeed = newSpeed;
                    if (musicSystem.loopInterval) {
                        clearInterval(musicSystem.loopInterval);
                        startMelodyLoop([261.63, 293.66, 329.63, 392.00, 440.00]);
                    }
                }
            }

            function stopAdaptiveMusic() {
                if (musicSystem.loopInterval) {
                    clearInterval(musicSystem.loopInterval);
                    musicSystem.loopInterval = null;
                }
                
                if (musicSystem.context) {
                    try {
                        musicSystem.context.close();
                    } catch (e) {}
                }
                
                musicSystem.isPlaying = false;
                musicSystem.context = null;
                document.getElementById('musicBtn').innerHTML = '🎵 Música';
            }

            const MAX_OBSTACLES = 5;
            let obstacleTimer = null;

            function createObstacle() {
                if (gameState.obstacles.length >= MAX_OBSTACLES) return null;
                
                let baseChance = Math.min(0.3, 0.05 + (gameState.score / 1000));
                
                if (gameState.stars.length > 0 && Math.random() < baseChance) {
                    return {
                        x: Math.random() * (canvas.width - 30) + 15,
                        y: Math.random() * (canvas.height - 30) + 15,
                        radius: 12,
                        speedX: (Math.random() - 0.5) * gameState.baseSpeed * (0.5 + gameState.score / 500),
                        speedY: (Math.random() - 0.5) * gameState.baseSpeed * (0.5 + gameState.score / 500),
                        visible: true,
                        blinkTimer: null
                    };
                }
                return null;
            }

            function startObstacleBlinking() {
                if (obstacleTimer) clearInterval(obstacleTimer);
                
                obstacleTimer = setInterval(() => {
                    if (!gameState.gameActive || gameState.obstacles.length === 0) return;
                    
                    gameState.obstacles.forEach(obs => {
                        if (activeBoosts.hideObstacles) return;
                        if (Math.random() < 0.2) {
                            obs.visible = !obs.visible;
                            
                            if (!obs.visible) {
                                if (obs.blinkTimer) clearTimeout(obs.blinkTimer);
                                obs.blinkTimer = setTimeout(() => {
                                    if (obs && !activeBoosts.hideObstacles) obs.visible = true;
                                }, 800 + Math.random() * 1500);
                            }
                        }
                    });
                }, 2500);
            }

            function initGame() {
                gameState.stars = [];
                gameState.obstacles = [];
                gameState.score = 0;
                gameState.combo = 1;
                gameState.maxCombo = 1;
                gameState.gameActive = true;
                gameState.starsCollected = 0;
                gameState.startTime = Date.now();
                
                for (let i = 0; i < STAR_CONFIG.baseStars; i++) {
                    gameState.stars.push(createStar());
                }
                
                gameState.player.x = canvas.width / 2;
                gameState.player.y = canvas.height / 2;
                
                loadDailyChallenges();
                updateDisplay();
                updateCombo();
                updateLivesDisplay();
                
                startObstacleBlinking();
                
                if (musicSystem.isPlaying) {
                    stopAdaptiveMusic();
                    setTimeout(() => initAdaptiveMusic(), 100);
                }
                
                trackGameStats();
            }

                scoreDisplay.textContent = Math.floor(gameState.score);
                recordDisplay.textContent = Math.floor(gameState.record);

                document.getElementById('challenge1Progress').textContent = `${dailyChallenges.stars.current}/${dailyChallenges.stars.target}`;
                document.getElementById('challenge2Progress').textContent = `${dailyChallenges.combo.current}/${dailyChallenges.combo.target}`;
                document.getElementById('challenge3Progress').textContent = `${dailyChallenges.share.current}/${dailyChallenges.share.target}`;
                
                document.getElementById('challenge1Target').textContent = dailyChallenges.stars.target;
                document.getElementById('challenge2Target').textContent = dailyChallenges.combo.target;
                
                checkDailyChallenges();

            function checkDailyChallenges() {
                let updated = false;
                let completedChallenge = null;
                
                if (dailyChallenges.stars.current >= dailyChallenges.stars.target && !dailyChallenges.stars.completed) {
                    dailyChallenges.stars.completed = true;
                    gameState.score += dailyChallenges.stars.reward;
                    showBonusAnimation(`+${dailyChallenges.stars.reward} ESTRELAS!`);
                    updateMonthlyProgress('stars', dailyChallenges.stars.target);
                    updated = true;
                    completedChallenge = 'stars';
                }
                
                if (dailyChallenges.combo.current >= dailyChallenges.combo.target && !dailyChallenges.combo.completed) {
                    dailyChallenges.combo.completed = true;
                    gameState.score += dailyChallenges.combo.reward;
                    showBonusAnimation(`+${dailyChallenges.combo.reward} COMBO!`);
                    updated = true;
                    completedChallenge = 'combo';
                }
                
                if (dailyChallenges.share.current >= dailyChallenges.share.target && !dailyChallenges.share.completed) {
                    dailyChallenges.share.completed = true;
                    gameState.score += dailyChallenges.share.reward;
                    showBonusAnimation(`+${dailyChallenges.share.reward} COMPARTILHAR!`);
                    updated = true;
                    completedChallenge = 'share';
                }
                
                if (updated) {
                    saveDailyChallenges();
                    saveGameProgress();
                    updateDisplay();
                }
            }

            function loadDailyChallenges() {
                const today = new Date().toDateString();
                const saved = localStorage.getItem('dailyChallenges');
                
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (data.date === today) {
                            dailyChallenges = data.challenges;
                        } else {
                            resetDailyChallenges();
                        }
                    } catch (e) {
                        resetDailyChallenges();
                    }
                } else {
                    resetDailyChallenges();
                }
                updateDisplay();
            }

            function resetDailyChallenges() {
                const baseTarget = Math.max(500, Math.floor((gameState?.record || 0) / 100) * 100);
                
                dailyChallenges = {
                    stars: { current: 0, target: baseTarget, completed: false, reward: baseTarget * 10 },
                    combo: { current: 0, target: Math.max(20, Math.floor((gameState?.maxCombo || 1) * 1.5)), completed: false, reward: 5000 },
                    share: { current: 0, target: 5, completed: false, reward: 1000 }
                };
                saveDailyChallenges();
            }

            function saveDailyChallenges() {
                localStorage.setItem('dailyChallenges', JSON.stringify({
                    date: new Date().toDateString(),
                    challenges: dailyChallenges
                }));
            }

            function updateDailyChallenges(type, value) {
                if (!dailyChallenges[type].completed) {
                    const oldValue = dailyChallenges[type].current;
                    dailyChallenges[type].current = Math.min(
                        oldValue + value,
                        dailyChallenges[type].target
                    );
                    
                    if (oldValue !== dailyChallenges[type].current) {
                        updateDisplay();
                        saveDailyChallenges();
                        saveGameProgress();
                    }
                }
            }

            function addToRanking() {
                const playerName = gameState.playerName;
                const existingIndex = ranking.findIndex(r => r.name === playerName);
                
                if (existingIndex >= 0) {
                    if (gameState.record > ranking[existingIndex].score) {
                        ranking[existingIndex] = {
                            name: playerName,
                            score: Math.floor(gameState.record),
                            date: new Date().toLocaleDateString()
                        };
                        saveGameProgress();
                    }
                } else {
                    ranking.push({
                        name: playerName,
                        score: Math.floor(gameState.record),
                        date: new Date().toLocaleDateString()
                    });
                    saveGameProgress();
                }
                
                ranking.sort((a,b) => b.score - a.score);
                ranking = ranking.slice(0, 20);
                localStorage.setItem('ranking', JSON.stringify(ranking));
                
                if (supabaseInitialized && gameState.record > 0) {
                    supabase.from('rankings').upsert([{
                        player_id: gameState.playerName,
                        player_name: playerName,
                        score: Math.floor(gameState.record),
                        stars_collected: gameState.starsCollected || 0,
                        max_combo: gameState.maxCombo || 1,
                        country: 'BR'
                    }], { onConflict: 'player_id' })
                    .then(response => {
                        if (!response.error) {
                            console.log('✅ Score enviado para ranking global!');
                            
                            
                            const activeChallenge = localStorage.getItem('active_challenge');
                            if (activeChallenge) {
                                try {
                                    const challenge = JSON.parse(activeChallenge);
                                    if (gameState.record >= parseInt(challenge.score)) {
                                        showMessage(`🏆 DESAFIO VENCIDO! Você bateu ${challenge.challenger}!`);
                                        localStorage.removeItem('active_challenge');
                                        generateChallengeLink();
                                    }
                                } catch (e) {}
                            }
                        }
                    })
                    .catch(error => console.error('Erro ao enviar score:', error));
                }
            }

            async function showRanking() {
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h2 style="color:#ffd700; text-align:center;">🏆 Ranking Global</h2>
                        <p style="text-align:center; color:#aaa; margin:20px 0;">⏳ Carregando...</p>
                    </div>`;
                document.body.appendChild(modal);

                if (!supabaseInitialized) {
                    let html = '<div class="modal-content"><h2 style="color:#ffd700; text-align:center;">🏆 Ranking Local</h2>';
                    html += '<p style="text-align:center; margin:10px; color:#888;">📱 Apenas desta máquina</p>';
                    if (ranking.length === 0) {
                        html += '<p style="text-align:center; margin:20px;">Nenhum recorde ainda. Jogue e seja o primeiro!</p>';
                    } else {
                        ranking.forEach((item, index) => {
                            const isCurrentPlayer = item.name === gameState.playerName;
                            const isGolden = localStorage.getItem('golden_name_' + item.name) === 'true';
                            const crown = index === 0 ? ' 👑' : '';
                            html += `
                                <div class="ranking-item" style="${isCurrentPlayer ? 'background: rgba(255,215,0,0.2); border-radius: 10px;' : ''}">
                                    <span class="ranking-position" style="${isGolden ? 'color:#ffd700;' : ''}">#${index+1}</span>
                                    <span style="${isGolden ? 'color:#ffd700; font-weight:bold;' : ''}">${item.name}${crown} ${isGolden ? '✨' : ''}</span>
                                    <span>${item.score} ⭐</span>
                                    <span style="font-size:0.8em;">${item.date}</span>
                                </div>`;
                        });
                    }
                    html += '<button class="consent-btn" style="margin-top:20px; width:100%;" onclick="this.closest(\'.modal\').remove()">Fechar</button></div>';
                    modal.innerHTML = html;
                    return;
                }

                try {
                    const { data: rankData, error: rankError } = await supabase
                        .from('rankings')
                        .select('player_name, score, max_combo, created_at')
                        .order('score', { ascending: false })
                        .limit(20);

                    if (rankError) throw rankError;

                    const twoMinutesAgo = new Date(Date.now() - 2 * 60000).toISOString();
                    const { data: onlineData } = await supabase
                        .from('players')
                        .select('player_name')
                        .gt('last_active', twoMinutesAgo);

                    const onlineNames = new Set((onlineData || []).map(p => p.player_name));
                    const onlineCount = onlineNames.size;

                    let html = '<div class="modal-content"><h2 style="color:#ffd700; text-align:center;">🏆 Ranking Global</h2>';
                    html += `<p style="text-align:center; margin:10px; color:#4a90e2;">🌍 Jogadores do mundo todo • 👥 ${onlineCount} online agora</p>`;

                    if (!rankData || rankData.length === 0) {
                        html += '<p style="text-align:center; margin:20px;">Seja o primeiro no ranking global!</p>';
                    } else {
                        rankData.forEach((item, index) => {
                            const isCurrentPlayer = item.player_name === gameState.playerName;
                            const isOnline = onlineNames.has(item.player_name);
                            const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                            const onlineDot = isOnline
                                ? '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#2ecc71;margin-left:6px;vertical-align:middle;" title="Online agora"></span>'
                                : '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#888;margin-left:6px;vertical-align:middle;" title="Offline"></span>';
                            const crown = index === 0 ? ' 👑' : '';
                            html += `
                                <div class="ranking-item" style="${isCurrentPlayer ? 'background: rgba(255,215,0,0.2); border-radius: 10px;' : ''}">
                                    <span class="ranking-position">${medal} #${index+1}</span>
                                    <span style="${index < 3 ? 'font-weight:bold; color:#ffd700;' : ''}">
                                        ${item.player_name}${crown}${onlineDot}
                                    </span>
                                    <span>${item.score} ⭐</span>
                                    <span style="font-size:0.8em;">${new Date(item.created_at).toLocaleDateString()}</span>
                                </div>`;
                        });
                    }

                    html += '<button class="consent-btn" style="margin-top:20px; width:100%;" onclick="this.closest(\'.modal\').remove()">Fechar</button></div>';
                    modal.innerHTML = html;

                } catch (error) {
                    console.error('Erro ao carregar ranking:', error);
                    modal.innerHTML = `
                        <div class="modal-content">
                            <h2 style="color:#ffd700; text-align:center;">🏆 Ranking</h2>
                            <p style="text-align:center; margin:20px; color:#f44336;">❌ Erro ao carregar ranking global.<br><small>${error.message || ''}</small></p>
                            <button class="consent-btn" style="margin-top:20px; width:100%;" onclick="this.closest('.modal').remove()">Fechar</button>
                        </div>`;
                }
            }

            function showSkins() {

                modal.className = 'modal';
                
                let skinsHTML = '<div class="modal-content"><h2 style="color:#ffd700; text-align:center;">🎨 Skins</h2>';
                
                Object.entries(skins).forEach(([key, skin]) => {
                    const isUnlocked = skin.unlocked;

                        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1);">

                            ${isUnlocked ? 
                                `<button class="consent-btn" style="padding:5px 15px;" onclick="window.selectSkin('${key}')">Selecionar</button>` :

            function getSkinProgress(skinKey) {
                switch(skinKey) {
                    case 'neon': 
                        return `${gameState.totalStars}/50 estrelas`;
                    case 'cosmos': 
                        return `${gameState.totalStars}/100 estrelas`;
                    case 'arcoiris': 
                        return `${gameState.maxCombo}/10 combo`;
                    default: 
                        return '';
                }
            }

            function getUnlockRequirement(skinKey) {
                switch(skinKey) {
                    case 'neon': return 'Colete 50 estrelas';
                    case 'cosmos': return 'Colete 100 estrelas';
                    case 'arcoiris': return 'Combo x10';
                    default: return '';
                }
            }

            function selectSkin(skinKey) {
                if (skins[skinKey].unlocked) {
                    gameState.currentSkin = skinKey;
                    localStorage.setItem('skin', skinKey);
                    saveGameProgress();
                    showMessage(`✨ Skin ${skins[skinKey].name} selecionada!`);
                    document.querySelector('.modal').remove();
                } else {
                    showMessage(`🔒 Desbloqueie primeiro: ${getUnlockRequirement(skinKey)}`);
                }
            }

            function checkCollisions() {
                gameState.stars.forEach(star => {
                    if (!star.collected) {
                        const dx = gameState.player.x - star.x;
                        const dy = gameState.player.y - star.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < gameState.player.radius + star.radius) {
                            star.collected = true;
                            
                            let points = 0.01 * gameState.combo * gameState.eventMultiplier;
                            if (gameState.weekendBonus) points *= 1.5;
                            gameState.achievementStars += 0.01;
                            
                            if (activeBoosts.doublePoints) points *= 2;
                            
                            gameState.score += points;
                            gameState.totalStars++;
                            gameState.starsCollected++;
                            
                            if (gameState.comboTimeout) clearTimeout(gameState.comboTimeout);
                            gameState.combo++;
                            updateCombo();
                            
                            gameState.comboTimeout = setTimeout(() => resetCombo(), 3000);
                            
                            if (gameState.score > gameState.record) {
                                gameState.record = gameState.score;
                                showBonusAnimation('🏆 NOVO RECORDE!');
                                addToRanking();
                            }
                            
                            manageStars();
                            
                            createCollectSound();
                            
                            updateDailyChallenges('stars', 1);
                            
                            checkAchievements();
                            updateDisplay();
                        }
                    }
                });

                manageStars();

                while (gameState.obstacles.length < Math.min(MAX_OBSTACLES, Math.floor(gameState.score / 100) + 1)) {
                    const obs = createObstacle();
                    if (obs) {
                        if (activeBoosts.hideObstacles) obs.visible = false;
                        gameState.obstacles.push(obs);
                    }
                }

                gameState.obstacles.forEach(obs => {
                    if (!obs.visible) return;
                    
                    const dx = gameState.player.x - obs.x;
                    const dy = gameState.player.y - obs.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < gameState.player.radius + obs.radius && gameState.gameActive) {
                        if (activeBoosts.extraLife) {
                            activeBoosts.extraLife = false;
                            showMessage('💫 Escudo ativado!');
                            gameState.player.x = Math.random() * (canvas.width - 40) + 20;
                            gameState.player.y = Math.random() * (canvas.height - 40) + 20;
                        } 
                        else if (LIFE_SYSTEM.lose()) {
                            gameState.player.x = canvas.width / 2;
                            gameState.player.y = canvas.height / 2;
                            gameState.obstacles = [];
                        }
                        else {
                            gameState.gameActive = false;
                            createComboBreakSound();
                            stopAdaptiveMusic();
                            
                            if (obstacleTimer) {
                                clearInterval(obstacleTimer);
                                obstacleTimer = null;
                            }
                            
                            showMessage('💫 TODAS AS ESTRELAS SE APAGARAM...');
                            
                            if (checkAdCooldown('rewarded')) {
                                const continueBtn = document.createElement('div');
                                continueBtn.style.cssText = `
                                    position: fixed;
                                    bottom: 120px;
                                    left: 50%;
                                    transform: translateX(-50%);
                                    background: linear-gradient(45deg, #ffd700, #ffa500);
                                    color: #1a1f3a;
                                    padding: 15px 30px;
                                    border-radius: 50px;
                                    font-weight: bold;
                                    font-size: 1.2em;
                                    z-index: 1001;
                                    cursor: pointer;
                                    box-shadow: 0 5px 20px rgba(255,215,0,0.5);
                                    animation: pulse 1.5s infinite;
                                `;
                                continueBtn.innerHTML = '🌟 RENASCER COM UMA ESTRELA?';
                                
                                const timer = document.createElement('div');
                                timer.className = 'countdown-timer';
                                timer.id = 'continueTimer';
                                timer.innerHTML = '⏱️ 15s';
                                document.body.appendChild(timer);
                                
                                let secondsLeft = 15;
                                const timerInterval = setInterval(() => {
                                    secondsLeft--;
                                    if (secondsLeft > 0) {
                                        timer.innerHTML = `⏱️ ${secondsLeft}s`;
                                    } else {
                                        clearInterval(timerInterval);
                                        if (document.body.contains(timer)) timer.remove();
                                    }
                                }, 1000);
                                
                                continueBtn.onclick = () => {
                                    clearInterval(timerInterval);
                                    if (document.body.contains(timer)) timer.remove();
                                    if (document.body.contains(continueBtn)) document.body.removeChild(continueBtn);
                                    safeButtonClick('continueBtn', async () => {
                                        const watched = await showRewardedAd('extraLife');
                                        if (watched) {
                                            gameState.gameActive = true;
                                            initGame();
                                        } else {
                                            showInterstitialAd('game_over');
                                            showMessage(`💫 Game Over! Pontuação: ${gameState.score}`);
                                        }
                                    });
                                };
                                document.body.appendChild(continueBtn);
                                
                                setTimeout(() => {
                                    clearInterval(timerInterval);
                                    if (document.body.contains(continueBtn)) {
                                        document.body.removeChild(continueBtn);
                                        if (document.body.contains(timer)) timer.remove();
                                        
                                        if (!gameState.gameActive) {
                                            showInterstitialAd('game_over');
                                            showMessage(`💫 Game Over! Pontuação: ${gameState.score}`);
                                        }
                                    }
                                }, 15000);
                            } else {
                                showInterstitialAd('game_over');
                                showMessage(`💫 Game Over! Pontuação: ${gameState.score}`);
                            }
                        }
                    }
                });
            }

            function updateObstacles() {
                gameState.obstacles.forEach(obs => {
                    obs.x += obs.speedX;
                    obs.y += obs.speedY;
                    
                    if (obs.x < obs.radius) {
                        obs.x = obs.radius;
                        obs.speedX = Math.abs(obs.speedX);
                    }
                    if (obs.x > canvas.width - obs.radius) {
                        obs.x = canvas.width - obs.radius;
                        obs.speedX = -Math.abs(obs.speedX);
                    }
                    if (obs.y < obs.radius) {
                        obs.y = obs.radius;
                        obs.speedY = Math.abs(obs.speedY);
                    }
                    if (obs.y > canvas.height - obs.radius) {
                        obs.y = canvas.height - obs.radius;
                        obs.speedY = -Math.abs(obs.speedY);
                    }
                });
            }

            function getViralMessage(type) {
                const messages = {
                    gainLife: [
                        `🌟 Acabei de ganhar uma estrela da vida no Starrush!`,
                        `✨ Minha constelação está crescendo! +1 estrela!`,
                        `💫 Mais uma estrela brilhando no meu céu!`
                    ],
                    loseLife: [
                        `⭐ Perdi uma estrela... mas ainda brilham ${LIFE_SYSTEM.current}!`,
                        `✨ Ainda tenho estrelas para continuar!`,
                        `💪 Uma estrela se apagou, mas não vou desistir!`
                    ],
                    cometEvent: [
                        `💫 UM COMETA PASSOU! Ganhei 2 estrelas extras!`,
                        `✨ Evento raro! Cometa me deu mais estrelas!`,
                        `🌟 Minha sorte no Starrush está brilhando!`
                    ],
                    gameOver: [
                        `💫 Todas as estrelas se apagaram... Mas vou renascer!`,
                        `✨ Game Over no Starrush. Hora de brilhar de novo!`,
                        `🌟 Minhas estrelas vão voltar a brilhar!`
                    ]
                };
                
                const list = messages[type] || messages.gainLife;
                return list[Math.floor(Math.random() * list.length)];
            }

            function handleShare(platform, customMessage = null) {
                if (!gameState.bonusAvailable) {
                    showMessage('⏳ Aguarde 30s para outro bônus!');
                    return;
                }

                const text = customMessage || getShareText();
                const url = getGameUrl();
                const imageData = captureRecordScreenshot();

                // Tenta Web Share API com screenshot (mobile)
                if (navigator.share && navigator.canShare) {
                    fetch(imageData)
                        .then(res => res.blob())
                        .then(blob => {
                            const file = new File([blob], 'starrush.png', { type: 'image/png' });
                            const shareData = { title: 'Starrush', text: text, files: [file], url: decodeURIComponent(url) };
                            if (navigator.canShare(shareData)) {
                                return navigator.share(shareData);
                            } else {
                                return navigator.share({ title: 'Starrush', text: text, url: decodeURIComponent(url) });
                            }
                        })
                        .catch(() => {});
                } else {
                    // Desktop: baixa screenshot e abre rede social
                    const link = document.createElement('a');
                    link.download = 'starrush-score.png';
                    link.href = imageData;
                    link.click();

                    let shareUrl = '';
                    switch(platform) {
                        case 'x':
                            shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${url}`;
                            break;
                        case 'facebook':
                            shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${encodeURIComponent(text)}`;
                            break;
                        case 'whatsapp':
                            shareUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}%20${url}`;
                            break;
                    }
                    if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
                }

                let bonus = 25 * gameState.combo;
                gameState.score += bonus;
                gameState.totalShares++;
                gameState.bonusAvailable = false;

                updateDailyChallenges('share', 1);
                updateMonthlyProgress('shares', 1);

                createAchievementSound();
                showBonusAnimation(`+${bonus} COMPARTILHOU!`);
                showMessage(`🎁 Bônus de ${bonus} pontos!`);

                checkAchievements();
                updateDisplay();
                saveGameProgress();

                setTimeout(() => {
                    gameState.bonusAvailable = true;
                    showMessage('✨ Novo bônus disponível!');
                }, 30000);
            }

            function getShareText() {
                const frases = [
                    `✨ ${gameState.playerName} fez ${gameState.score.toFixed(2)} pontos no Starrush Infinito! Consegue superar? 🌟`,
                    `🔥 ${gameState.playerName} conseguiu combo x${gameState.maxCombo} no Starrush! 🎮`,
                    `🏆 ${gameState.playerName} bateu recorde: ${gameState.record.toFixed(2)} estrelas! Vem jogar 💫`,
                    `🌟 ${gameState.playerName} já coletou ${gameState.totalStars} estrelas no Starrush!`,
                    `⚡ ${gameState.playerName} conquistou ${playerAchievements.length} conquistas! E você?`,
                    `📅 ${gameState.playerName} já completou ${challengeHistory.currentMonth.stars} estrelas este mês!`,
                    `🔥 ${gameState.playerName} está tentando o combo x100! Será que consegue?`,
                    `🌟 ${gameState.playerName} tem ${LIFE_SYSTEM.current} estrelas da vida!`,
                    getViralMessage('gainLife')
                ];
                return frases[Math.floor(Math.random() * frases.length)];
            }

            function getGameUrl() {
                return encodeURIComponent(window.location.href);
            }

            let mouseDown = false;

            function handleStart(e) {
                e.preventDefault();
                mouseDown = true;
                if (!gameState.gameActive) return;
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                updatePlayerPosition(e);
            }

            function handleMove(e) {
                e.preventDefault();
                if (!mouseDown || !gameState.gameActive) return;
                updatePlayerPosition(e);
            }

            function handleEnd(e) {
                e.preventDefault();
                mouseDown = false;
            }

            function handleLeave(e) {
                if (mouseDown && gameState.gameActive) {
                    showMessage('👆 Volte para o canvas para continuar');
                }
                mouseDown = false;
            }

            function updatePlayerPosition(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                let clientX, clientY;
                
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.changedTouches && e.changedTouches.length > 0) {
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                let x = (clientX - rect.left) * scaleX;
                let y = (clientY - rect.top) * scaleY;
                
                gameState.player.x = Math.max(gameState.player.radius, Math.min(canvas.width - gameState.player.radius, x));
                gameState.player.y = Math.max(gameState.player.radius, Math.min(canvas.height - gameState.player.radius, y));
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                for (let i = 0; i < 50; i++) {
                    ctx.beginPath();
                    ctx.arc((i * 37) % canvas.width, (i * 23) % canvas.height, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                gameState.obstacles.forEach(obs => {
                    if (!obs.visible) return;
                    
                    ctx.beginPath();
                    ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 100, 100, 0.8)';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
                
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 20;
                const currentSkin = skins[gameState.currentSkin];
                
                gameState.stars.forEach(star => {
                    const scale = 1 + Math.sin(Date.now() * 0.005 + star.pulsePhase) * 0.1;
                    
                    ctx.save();
                    ctx.translate(star.x, star.y);
                    ctx.scale(scale, scale);
                    
                    if (currentSkin.stars === 'multicolor') {
                        ctx.fillStyle = `hsl(${Date.now() * 0.1 % 360}, 100%, 50%)`;
                    } else {
                        ctx.fillStyle = currentSkin.stars;
                    }
                    
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 72 - 90) * Math.PI / 180;
                        const x1 = Math.cos(angle) * star.radius;
                        const y1 = Math.sin(angle) * star.radius;
                        const x2 = Math.cos(angle + 36 * Math.PI / 180) * (star.radius * 0.4);
                        const y2 = Math.sin(angle + 36 * Math.PI / 180) * (star.radius * 0.4);
                        
                        if (i === 0) ctx.moveTo(x1, y1);
                        else ctx.lineTo(x1, y1);
                        ctx.lineTo(x2, y2);
                    }
                    ctx.closePath();
                    
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    ctx.restore();
                });
                
                ctx.shadowColor = '#4a90e2';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(gameState.player.x, gameState.player.y, gameState.player.radius, 0, Math.PI * 2);
                
                if (currentSkin.player === 'linear-gradient') {
                    const gradient = ctx.createRadialGradient(
                        gameState.player.x - 5, gameState.player.y - 5, 5,
                        gameState.player.x, gameState.player.y, gameState.player.radius + 5
                    );
                    currentSkin.playerGradient.forEach((color, i) => {
                        gradient.addColorStop(i / (currentSkin.playerGradient.length - 1), color);
                    });
                    ctx.fillStyle = gradient;
                } else {
                    const gradient = ctx.createRadialGradient(
                        gameState.player.x - 5, gameState.player.y - 5, 5,
                        gameState.player.x, gameState.player.y, gameState.player.radius + 5
                    );
                    gradient.addColorStop(0, currentSkin.playerGradient[0]);
                    gradient.addColorStop(1, currentSkin.playerGradient[1]);
                    ctx.fillStyle = gradient;
                }
                
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(gameState.player.x - 5, gameState.player.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(gameState.player.x + 5, gameState.player.y - 5, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(gameState.player.x - 6, gameState.player.y - 6, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(gameState.player.x + 4, gameState.player.y - 6, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                
                if (!gameState.gameActive) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 24px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('💫 GAME OVER', canvas.width/2, canvas.height/2);
                    ctx.font = '16px Arial';
                    ctx.fillText(`Pontuação: ${gameState.score.toFixed(2)}`, canvas.width/2, canvas.height/2 + 40);
                }
            }

            function gameLoop() {
                if (gameState.gameActive) {
                    updateObstacles();
                    checkCollisions();
                    updateMusicSpeed();
                }
                draw();
                requestAnimationFrame(gameLoop);
            }

            function initGameAfterConsent() {
                loadGameProgress();
                
                const savedRanking = localStorage.getItem('ranking');
                if (savedRanking) {
                    try {
                        ranking = JSON.parse(savedRanking);
                    } catch (e) {}
                }
                
                updateSkinsUnlocked();
                loadChallengeHistory();
                updateLivesDisplay();
                
                checkChallenge();
                updateStreak();
                checkActiveEvents();
                
                updateLastActive();
                
                initGame();
                gameLoop();
                
                canvas.addEventListener('mousedown', handleStart);
                canvas.addEventListener('mousemove', handleMove);
                canvas.addEventListener('mouseup', handleEnd);
                canvas.addEventListener('mouseleave', handleLeave);
                
                canvas.addEventListener('touchstart', handleStart, { passive: false });
                canvas.addEventListener('touchmove', handleMove, { passive: false });
                canvas.addEventListener('touchend', handleEnd);
                canvas.addEventListener('touchcancel', handleEnd);

                newGameBtn.addEventListener('click', () => {
                    safeButtonClick('newGameBtn', () => {
                        if (checkAdCooldown('interstitial')) {
                            showInterstitialAd('new_game');
                        }
                        LIFE_SYSTEM.reset();
                        gameState.gameActive = true;
                        initGame();
                        showMessage('🌟 Nova jornada infinita!');
                    });
                });

                shareXBtn.addEventListener('click', () => handleShare('x'));
                shareFacebookBtn.addEventListener('click', () => handleShare('facebook'));
                shareWhatsAppBtn.addEventListener('click', () => handleShare('whatsapp'));

                musicBtn.addEventListener('click', toggleMusic);
                
                bonusBtn.addEventListener('click', () => {
                    safeButtonClick('bonusBtn', showBonusMenu);
                });
                
                rankingBtn.addEventListener('click', showRanking);
                skinBtn.addEventListener('click', showSkins);
                historyBtn.addEventListener('click', showMonthlyHistory);

                document.body.addEventListener('click', function initAudio() {
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                }, { once: true });
                
                setInterval(saveGameProgress, 30000);
            }

            window.__cmpLoaded = false;
            
            if (typeof cookieScript !== 'undefined') {
                window.__cmpLoaded = true;
            }
            
            (async function init() {
                // TermsFeed já cuida do consentimento automaticamente
                // Só mostramos o tutorial quando o jogo estiver pronto
                setTimeout(() => {
                    showTutorial();
                }, 1000);
            })();

            window.showRanking = showRanking;
            window.showSkins = showSkins;
            window.selectSkin = selectSkin;
        })();
    </script>
